function ls(key, fb) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } }
function lsSet(key, v) { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }

// ─── Persistent Storage (localStorage) ──────────
async function storageGet(key, fb) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fb;
  } catch {
    return fb;
  }
}
async function storageSet(key, v) {
  try {
    localStorage.setItem(key, JSON.stringify(v));
  } catch {}
}

// ─── PFP Frame SVG Component ──────────────────────────
function PfpFrame({ frameId, size = 72, accent = "#6C5CE7" }) {
  if (!frameId || frameId === "none") return null;
  const s = size, pad = Math.round(s * 0.22), full = s + pad * 2;
  const cx = full / 2, cy = full / 2;
  const ri = s / 2 + 1; // inner radius (just outside avatar)
  const ro = s / 2 + pad * 0.85; // outer radius
  const style = { position: "absolute", top: -pad, left: -pad, pointerEvents: "none" };
  const deg2rad = d => d * Math.PI / 180;
  const polar = (angle, radius) => [cx + radius * Math.cos(deg2rad(angle - 90)), cy + radius * Math.sin(deg2rad(angle - 90))];

  const frames = {
    // Lv2: Thin geometric octagon
    "thin-ring": (() => {
      const pts = Array.from({length:8},(_,i)=>polar(i*45, ro)).map(p=>p.join(",")).join(" ");
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <polygon points={pts} fill="none" stroke={accent} strokeWidth="1.2" opacity="0.5" strokeLinejoin="round"/>
      </svg>;
    })(),

    // Lv3: Double-stroke rounded square with corner notches
    "dashed": (() => {
      const r2 = ro * 0.92, inset = pad * 0.4, corner = pad * 0.5;
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <rect x={cx-r2} y={cy-r2} width={r2*2} height={r2*2} rx={corner} fill="none" stroke={accent} strokeWidth="1.5" opacity="0.5"/>
        <rect x={cx-ri} y={cy-ri} width={ri*2} height={ri*2} rx={corner*0.7} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.25"/>
        {[[-1,-1],[1,-1],[1,1],[-1,1]].map(([dx,dy],i)=><circle key={i} cx={cx+dx*(r2-2)} cy={cy+dy*(r2-2)} r="1.5" fill={accent} opacity="0.4"/>)}
      </svg>;
    })(),

    // Lv4: Stacked chevrons pointing outward — angular energy
    "double-ring": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="1" opacity="0.3"/>
        {[0,45,90,135,180,225,270,315].map(deg => {
          const a = deg2rad(deg-90);
          const mx = cx + (ro-2) * Math.cos(a), my = cy + (ro-2) * Math.sin(a);
          const perpA = a + Math.PI/2;
          const tipA = a;
          const w = pad*0.25;
          const pts = [
            [mx - w*Math.cos(perpA), my - w*Math.sin(perpA)],
            [mx + pad*0.35*Math.cos(tipA), my + pad*0.35*Math.sin(tipA)],
            [mx + w*Math.cos(perpA), my + w*Math.sin(perpA)],
          ].map(p=>p.join(",")).join(" ");
          return <polygon key={deg} points={pts} fill={accent} opacity="0.4"/>;
        })}
      </svg>;
    })(),

    // Lv5: Spinning blade / shuriken shape
    "glow-pulse": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        {[0,60,120,180,240,300].map(deg => {
          const a1 = deg2rad(deg-90), a2 = deg2rad(deg-90+25), a3 = deg2rad(deg-90-25);
          const tip = polar(deg, ro+2);
          const base1 = [cx + ri * Math.cos(a2), cy + ri * Math.sin(a2)];
          const base2 = [cx + ri * Math.cos(a3), cy + ri * Math.sin(a3)];
          return <polygon key={deg} points={`${tip[0]},${tip[1]} ${base1[0]},${base1[1]} ${base2[0]},${base2[1]}`} fill={accent} opacity="0.3"/>;
        })}
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="1.2" opacity="0.5"/>
      </svg>;
    })(),

    // Lv6: Botanical — leaf shapes radiating from the ring
    "leaf-ring": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.35"/>
        {[0,36,72,108,144,180,216,252,288,324].map(deg => {
          const a = deg2rad(deg-90);
          const base = [cx+(ri+2)*Math.cos(a), cy+(ri+2)*Math.sin(a)];
          const tip = [cx+(ro+1)*Math.cos(a), cy+(ro+1)*Math.sin(a)];
          const perp = deg2rad(deg);
          const w = pad*0.18;
          const ctrl1 = [base[0]+w*Math.cos(perp)+(tip[0]-base[0])*0.4, base[1]+w*Math.sin(perp)+(tip[1]-base[1])*0.4];
          const ctrl2 = [base[0]-w*Math.cos(perp)+(tip[0]-base[0])*0.4, base[1]-w*Math.sin(perp)+(tip[1]-base[1])*0.4];
          return <path key={deg} d={`M${base[0]},${base[1]} Q${ctrl1[0]},${ctrl1[1]} ${tip[0]},${tip[1]} Q${ctrl2[0]},${ctrl2[1]} ${base[0]},${base[1]}Z`} fill={accent} opacity="0.35"/>;
        })}
      </svg>;
    })(),

    // Lv7: Hexagonal — your favorite. Clean hex with inner detail
    "hex": (() => {
      const outerPts = Array.from({length:6},(_,i)=>polar(i*60, ro)).map(p=>p.join(",")).join(" ");
      const innerPts = Array.from({length:6},(_,i)=>polar(i*60, ri+2)).map(p=>p.join(",")).join(" ");
      const midPts = Array.from({length:6},(_,i)=>polar(i*60+30, (ri+ro)/2)).map(p=>p.join(",")).join(" ");
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <polygon points={outerPts} fill="none" stroke={accent} strokeWidth="1.8" opacity="0.6" strokeLinejoin="round"/>
        <polygon points={innerPts} fill="none" stroke={accent} strokeWidth="0.6" opacity="0.2" strokeLinejoin="round"/>
        {Array.from({length:6},(_,i)=>{
          const p1=polar(i*60,ri+2),p2=polar(i*60,ro);
          return <line key={i} x1={p1[0]} y1={p1[1]} x2={p2[0]} y2={p2[1]} stroke={accent} strokeWidth="0.5" opacity="0.2"/>;
        })}
        {Array.from({length:6},(_,i)=>{
          const p=polar(i*60+30,(ri+ro)/2);
          return <circle key={i} cx={p[0]} cy={p[1]} r={pad*0.08} fill={accent} opacity="0.4"/>;
        })}
      </svg>;
    })(),

    // Lv8: Flame corona — jagged flame tips around the ring
    "flame-ring": (() => {
      const count = 12;
      let path = "";
      for (let i = 0; i < count; i++) {
        const deg = i * (360/count);
        const innerP = polar(deg, ri+1);
        const tipP = polar(deg + 360/count/2, ro + pad*0.15);
        const nextInner = polar(deg + 360/count, ri+1);
        path += `${i===0?"M":"L"}${innerP[0]},${innerP[1]} Q${polar(deg+360/count/4,ro*0.8)[0]},${polar(deg+360/count/4,ro*0.8)[1]} ${tipP[0]},${tipP[1]} Q${polar(deg+360/count*3/4,ro*0.8)[0]},${polar(deg+360/count*3/4,ro*0.8)[1]} ${nextInner[0]},${nextInner[1]} `;
      }
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <path d={path+"Z"} fill={accent} opacity="0.15" stroke={accent} strokeWidth="1" strokeOpacity="0.5"/>
      </svg>;
    })(),

    // Lv9: Royal crest — ornate pointed crown shape at top with flanking wings
    "crown": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="1.2" opacity="0.4"/>
        {/* Crown points at top */}
        {[-40,-20,0,20,40].map((offset,i)=>{
          const p = polar(offset, ro + (i===2?pad*0.3:i===1||i===3?pad*0.15:0));
          const base1 = polar(offset-8, ri+2);
          const base2 = polar(offset+8, ri+2);
          return <polygon key={i} points={`${p[0]},${p[1]} ${base1[0]},${base1[1]} ${base2[0]},${base2[1]}`} fill={accent} opacity={i===2?0.5:0.3}/>;
        })}
        {/* Gems at crown tips */}
        {[-40,0,40].map((offset,i)=>{
          const p = polar(offset, ro + (i===1?pad*0.3:0));
          return <circle key={i} cx={p[0]} cy={p[1]} r={pad*0.07} fill={accent} opacity="0.7"/>;
        })}
        {/* Side filigree */}
        {[130,230].map(deg=>{
          const p = polar(deg, ro-1);
          return <circle key={deg} cx={p[0]} cy={p[1]} r={pad*0.12} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.25"/>;
        })}
      </svg>;
    })(),

    // Lv10: Faceted gem — 12-sided polygon with inner facet lines creating diamond cuts
    "diamond": (() => {
      const outerPts = Array.from({length:12},(_,i)=>polar(i*30, ro));
      const innerPts = Array.from({length:12},(_,i)=>polar(i*30+15, (ri+ro)/2*0.95));
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <polygon points={outerPts.map(p=>p.join(",")).join(" ")} fill="none" stroke={accent} strokeWidth="1.5" opacity="0.5" strokeLinejoin="round"/>
        {outerPts.map((p,i)=>{
          const next = innerPts[i];
          const prev = innerPts[(i+11)%12];
          return <g key={i}>
            <line x1={p[0]} y1={p[1]} x2={next[0]} y2={next[1]} stroke={accent} strokeWidth="0.6" opacity="0.25"/>
            <line x1={p[0]} y1={p[1]} x2={prev[0]} y2={prev[1]} stroke={accent} strokeWidth="0.6" opacity="0.25"/>
          </g>;
        })}
        <polygon points={innerPts.map(p=>p.join(",")).join(" ")} fill="none" stroke={accent} strokeWidth="0.5" opacity="0.15"/>
      </svg>;
    })(),

    // Lv11: Sacred geometry — flower of life pattern around the ring
    "ornate": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <circle cx={cx} cy={cy} r={ro} fill="none" stroke={accent} strokeWidth="1" opacity="0.3"/>
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.2"/>
        {Array.from({length:6},(_,i)=>{
          const p = polar(i*60, (ri+ro)/2);
          const circR = (ro-ri)/2*0.9;
          return <circle key={i} cx={p[0]} cy={p[1]} r={circR} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.3"/>;
        })}
        {Array.from({length:6},(_,i)=>{
          const p = polar(i*60+30, (ri+ro)/2);
          const circR = (ro-ri)/2*0.5;
          return <circle key={`s${i}`} cx={p[0]} cy={p[1]} r={circR} fill={accent} opacity="0.12"/>;
        })}
        {Array.from({length:12},(_,i)=>{
          const p = polar(i*30, ro);
          return <circle key={`d${i}`} cx={p[0]} cy={p[1]} r={pad*0.04} fill={accent} opacity="0.5"/>;
        })}
      </svg>;
    })(),

    // Lv12: Legendary — complex layered mandala with radiating beams
    "legendary": (() => {
      const starOuter = Array.from({length:8},(_,i)=>{
        const isSpike = i%2===0;
        return polar(i*45, isSpike ? ro+pad*0.2 : (ri+ro)/2*0.95);
      });

// ─── Smoke Background ──────────────────────────────────
// Generates vertically-tileable smoke textures using canvas noise.
// Accent color is baked directly into the texture pixels.
// Regenerates textures when accent changes. After generation:
// pure CSS translateY animation on pre-rendered images = zero lag.
function SmokeBackground({ accent = "#6C5CE7", accent2 }) {
  const containerRef = useRef(null);
  const [textures, setTextures] = useState(null);
  const noiseCache = useRef(null);

  // Noise generation functions — cached so we only compute noise grids once
  useEffect(() => {
    const W = 128, H = 256;

    function makeNoise(seed) {
      const grid = [];
      let s = seed;
      const rand = () => { s = (s * 16807 + 0) % 2147483647; return (s & 0x7fffffff) / 2147483647; };
      for (let i = 0; i < 4096; i++) grid.push(rand());
      return (x, y) => {
        const gw = 64;
        const xi = ((Math.floor(x) % gw) + gw) % gw;
        const yi = ((Math.floor(y) % gw) + gw) % gw;
        const xf = x - Math.floor(x), yf = y - Math.floor(y);
        const sx = xf * xf * (3 - 2 * xf), sy = yf * yf * (3 - 2 * yf);
        const i00 = grid[(yi * gw + xi) % 4096];
        const i10 = grid[(yi * gw + ((xi + 1) % gw)) % 4096];
        const i01 = grid[(((yi + 1) % gw) * gw + xi) % 4096];
        const i11 = grid[(((yi + 1) % gw) * gw + ((xi + 1) % gw)) % 4096];
        return i00 * (1 - sx) * (1 - sy) + i10 * sx * (1 - sy) + i01 * (1 - sx) * sy + i11 * sx * sy;
      };
    }

    function fbm(fn, x, y, oct) {
      let v = 0, a = 1, f = 1, m = 0;
      for (let i = 0; i < oct; i++) { v += fn(x * f, y * f) * a; m += a; a *= 0.5; f *= 2; }
      return v / m;
    }

    // Pre-compute noise value arrays (heavy work, done once)
    function computeNoiseField(seed) {
      const n1 = makeNoise(seed), n2 = makeNoise(seed + 100);
      const field = new Float32Array(W * H);
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          // Very low frequency = big soft billowy shapes
          const nx = x / W * 3.5;
          const ny = y / H * 5;
          // Gentle domain warping
          const wx = fbm(n2, nx + 3.3, ny + 1.7, 3) * 1.2;
          const wy = fbm(n2, nx + 7.1, ny + 4.2, 3) * 1.2;
          let v = fbm(n1, nx + wx, ny + wy, 3);

          // Wide vertical tile zone — 40% on each end
          const tileZone = 0.4;
          const yNorm = y / H;
          let tileFade = 1;
          if (yNorm < tileZone) tileFade = yNorm / tileZone;
          if (yNorm > 1 - tileZone) tileFade = (1 - yNorm) / tileZone;
          tileFade = tileFade * tileFade * (3 - 2 * tileFade);

          const xFade = 1 - Math.pow((x / W - 0.5) * 2, 4) * 0.3;

          v = Math.pow(v, 1.05) * tileFade * xFade;

      const blurred = new Float32Array(W * H);

    }

    setTimeout(() => {
      const f1 = computeNoiseField(42);

        const f2 = computeNoiseField(137);

          const f3 = computeNoiseField(271);

        }, 50);
      }, 50);
    }, 200);
  }, []);

  // Render textures with specific accent color — fast because noise is cached
  function renderTextures(color1, color2) {
    const cache = noiseCache.current;
    if (!cache) return;
    const { W, H, fields } = cache;
    const r1 = parseInt(color1.slice(1, 3), 16);
    const g1 = parseInt(color1.slice(3, 5), 16);
    const b1 = parseInt(color1.slice(5, 7), 16);
    const r2 = color2 ? parseInt(color2.slice(1, 3), 16) : r1;
    const g2 = color2 ? parseInt(color2.slice(3, 5), 16) : g1;
    const b2 = color2 ? parseInt(color2.slice(5, 7), 16) : b1;

    // Each layer gets a different blend ratio: 0.0=color1, 1.0=color2
    const blendRatios = [0.0, 0.5, 1.0];
    const opacities = [0.3, 0.24, 0.18];
    const result = fields.map((field, fi) => {
      const c = document.createElement("canvas");
      c.width = W; c.height = H;
      const ctx = c.getContext("2d");
      const img = ctx.createImageData(W, H);
      const op = opacities[fi];
      const blend = blendRatios[fi];
      const cr = Math.round(r1 + (r2 - r1) * blend);
      const cg = Math.round(g1 + (g2 - g1) * blend);
      const cb = Math.round(b1 + (b2 - b1) * blend);

      for (let i = 0; i < W * H; i++) {
        const v = field[i] * op;
        const idx = i * 4;
        img.data[idx] = cr;
        img.data[idx + 1] = cg;
        img.data[idx + 2] = cb;
        img.data[idx + 3] = Math.round(v * 255);
      }
      ctx.putImageData(img, 0, 0);
      return c.toDataURL();
    });

    setTextures(result);
  }

  // Regenerate textures when accent changes — only pixel coloring, noise is cached
  const prevAccent = useRef(accent);
  const prevAccent2 = useRef(accent2);
  useEffect(() => {
    if ((accent !== prevAccent.current || accent2 !== prevAccent2.current) && noiseCache.current) {
      prevAccent.current = accent;
      prevAccent2.current = accent2;
      renderTextures(accent, accent2);
    }
  }, [accent, accent2]);

  return (
    <div ref={containerRef} style={{
      position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none",
      overflow: "hidden", background: "#04040c",
    }}>
      <style>{`
        @keyframes sr1{0%{transform:translateY(0%) scale(1.08)}100%{transform:translateY(-33.333%) scale(1.08)}}
        @keyframes sr2{0%{transform:translateY(0%) scale(1.11)}100%{transform:translateY(-33.333%) scale(1.11)}}
        @keyframes sr3{0%{transform:translateY(0%) scale(1.14)}100%{transform:translateY(-33.333%) scale(1.14)}}
        .sl{position:absolute;left:-8%;width:116%;will-change:transform;filter:blur(12px)}
        .sl img{width:100%;height:33.334%;display:block}
      `}</style>

      {textures && <>
        {/* 3 copies per layer = seam every 33%. Prime durations (53s, 41s, 31s)
            mean the 3 layers' seams never coincide. One layer's seam is always
            hidden by the other two layers' mid-texture regions. */}
        <div className="sl" style={{top:0,height:"300%",animation:"sr1 53s linear infinite",opacity:0.7}}>
          <img src={textures[0]} alt="" />
          <img src={textures[0]} alt="" />
          <img src={textures[0]} alt="" />
        </div>
        <div className="sl" style={{top:0,height:"300%",animation:"sr2 41s linear infinite",opacity:0.5,left:"-6%",width:"112%"}}>
          <img src={textures[1]} alt="" />
          <img src={textures[1]} alt="" />
          <img src={textures[1]} alt="" />
        </div>
        <div className="sl" style={{top:0,height:"300%",animation:"sr3 31s linear infinite",opacity:0.35}}>
          <img src={textures[2]} alt="" />
          <img src={textures[2]} alt="" />
          <img src={textures[2]} alt="" />
        </div>
      </>}

      {/* Bottom glow — accent colored, blends both for ombré */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"25%",background:accent2?`radial-gradient(ellipse 120% 100% at 30% 100%, ${accent}22 0%, transparent 60%), radial-gradient(ellipse 120% 100% at 70% 100%, ${accent2}22 0%, transparent 60%)`:`radial-gradient(ellipse 120% 100% at 50% 100%, ${accent}22 0%, ${accent}08 40%, transparent 75%)`}} />

    </div>
  );
}

function compressPhoto(file, maxSize=400) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w=img.width, h=img.height;
        if(w>h){if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize}}else{if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize}}
        canvas.width=w;canvas.height=h;canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",0.6));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  const [vaporTrail, setVaporTrail] = useState(false);

  // ─── Load all data from persistent storage on mount ───
  useEffect(() => {
    let mounted = true;

    // ─── PWA Setup ───────────────────────────────────
    // Generate a 192x192 and 512x512 icon using canvas
    function generateIcon(size) {
      const c = document.createElement("canvas");
      c.width = size; c.height = size;
      const ctx = c.getContext("2d");
      // Dark background
      ctx.fillStyle = "#04040c";
      ctx.fillRect(0, 0, size, size);
      // Accent circle
      const cx = size/2, cy = size/2, r = size * 0.35;
      const g = ctx.createRadialGradient(cx, cy*0.85, 0, cx, cy, r*1.2);
      g.addColorStop(0, "#6C5CE7");
      g.addColorStop(1, "#6C5CE7" + "40");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, r*1.1, 0, Math.PI*2); ctx.fill();
      // Flame shape
      ctx.fillStyle = "#6C5CE7";
      ctx.beginPath();
      const s = size * 0.003;
      ctx.moveTo(cx, cy - r*0.9);
      ctx.bezierCurveTo(cx - r*0.15, cy - r*0.5, cx - r*0.6, cy - r*0.2, cx - r*0.55, cy + r*0.3);
      ctx.bezierCurveTo(cx - r*0.5, cy + r*0.7, cx - r*0.2, cy + r*0.9, cx, cy + r*0.9);
      ctx.bezierCurveTo(cx + r*0.2, cy + r*0.9, cx + r*0.5, cy + r*0.7, cx + r*0.55, cy + r*0.3);
      ctx.bezierCurveTo(cx + r*0.6, cy - r*0.2, cx + r*0.15, cy - r*0.5, cx, cy - r*0.9);
      ctx.fill();
      // Inner lighter flame
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.beginPath();
      const ir = r * 0.55;
      ctx.moveTo(cx, cy - ir*0.6);
      ctx.bezierCurveTo(cx - ir*0.3, cy, cx - ir*0.35, cy + ir*0.5, cx, cy + ir*0.7);
      ctx.bezierCurveTo(cx + ir*0.35, cy + ir*0.5, cx + ir*0.3, cy, cx, cy - ir*0.6);
      ctx.fill();
      return c.toDataURL("image/png");
    }

    const icon192 = generateIcon(192);
    const icon512 = generateIcon(512);

    // Inject web app manifest
    const manifest = {
      name: "Puffco Companion",
      short_name: "Puffco",
      description: "Track your dabs, rate your concentrates, know your preferences.",

        { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
        { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" },
      ],
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
    const manifestUrl = URL.createObjectURL(blob);
    let link = document.querySelector('link[rel="manifest"]');
    if (!link) { link = document.createElement("link"); link.rel = "manifest"; document.head.appendChild(link); }
    link.href = manifestUrl;

    // Inject meta tags for iOS and Android PWA
    const metaTags = [
      { name: "apple-mobile-web-app-capable", content: "yes" },
      { name: "apple-mobile-web-app-status-bar-style", content: "black-translucent" },
      { name: "apple-mobile-web-app-title", content: "Puffco" },
      { name: "theme-color", content: "#04040c" },
      { name: "mobile-web-app-capable", content: "yes" },
      { name: "viewport", content: "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" },
    ];
    metaTags.forEach(({ name, content }) => {

      }
    });

    let appleIcon = document.querySelector('link[rel="apple-touch-icon"]');

    appleIcon.href = icon192;

        self.addEventListener("install", e => { self.skipWaiting(); });
        self.addEventListener("activate", e => { e.waitUntil(clients.claim()); });
        self.addEventListener("fetch", e => {
          e.respondWith(
            caches.match(e.request).then(r => r || fetch(e.request).then(res => {
              if (res.ok && e.request.method === "GET") {
                const clone = res.clone();
                caches.open("puffco-v1").then(c => c.put(e.request, clone));
              }
              return res;
            }).catch(() => caches.match(e.request))
            )
          );
        });
      `;
      const swBlob = new Blob([swCode], { type: "application/javascript" });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  }, []);

  // ─── Save to persistent storage on every change ───
  const saveRef = useRef(null);
  useEffect(() => {
    if (loading) return; // Don't save during initial load
    clearTimeout(saveRef.current);

  const accent = profile.accent || "#6C5CE7";

  const streak = useMemo(() => getStreak(stash), [stash]);

  const lvl = useMemo(() => getLvl(xp), [xp]);
  const unlocked = useMemo(() => ACHIEVEMENTS.filter(a => a.check(stash)), [stash]);
  const activeHP = heatProfiles.find(p => p.id === activeProfileId) || heatProfiles[0];

  // Feature #11: Strain encyclopedia data
  const strainMap = useMemo(() => {
    const m = {};
    stash.forEach(s => {
      if (!s.brand || !s.strain || s.brand==="Quick") return;
      const key = `${s.brand}|||${s.strain}`;
      if (!m[key]) m[key] = { brand:s.brand, strain:s.strain, sessions:[], types:new Set(), classifications:new Set() };

    const tempCounts = stash.reduce((a,s)=>{const z=getZone(s.finalTempF||500).name;a[z]=(a[z]||0)+1;return a},{});

    const topStrain = Object.entries(stash.reduce((a,s)=>{const k=s.strain;a[k]=(a[k]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1])[0];
    return { total:stash.length, avgRating:avg("rating"), avgVapor:avg("vapor"), avgTaste:avg("taste"), avgPotency:avg("potency"), brands:brands.length, strains:strains.length, favZone:favZone?favZone[0]:null, topStrain:topStrain?topStrain[0]:null, topStrainCount:topStrain?topStrain[1]:0 };
  }, [stash]);

  // ─── Optimal Temp Predictor ────────────────────────────
  const tempPredictor = useMemo(() => {
    if (stash.length < 5) return null;
    // Group sessions by extract type, time of day, and temp — find combos with highest avg rating
    const combos = {};
    stash.forEach(s => {
      if (!s.rating || s.rating < 1 || !s.finalTempF) return;
      const zone = getZone(s.finalTempF).name;
      const key = `${s.type||"Unknown"}|${s.timeOfDay||"Any"}|${zone}`;
      if (!combos[key]) combos[key] = { type:s.type, time:s.timeOfDay, zone, temps:[], ratings:[], count:0 };
      combos[key].temps.push(s.finalTempF);
      combos[key].ratings.push(s.rating);
      combos[key].count++;
    });
    // Find best combo with at least 2 sessions
    const ranked = Object.values(combos)
      .filter(c => c.count >= 2)
      .map(c => ({ ...c, avgRating: c.ratings.reduce((a,b)=>a+b,0)/c.ratings.length, avgTemp: Math.round(c.temps.reduce((a,b)=>a+b,0)/c.temps.length) }))
      .sort((a,b) => b.avgRating - a.avgRating);
    if (!ranked.length) return null;
    // Also find best temp per extract type
    const byType = {};
    stash.forEach(s => {
      if (!s.rating || !s.finalTempF || !s.type) return;
      if (!byType[s.type]) byType[s.type] = { temps:[], ratings:[] };
      byType[s.type].temps.push(s.finalTempF);
      byType[s.type].ratings.push(s.rating);
    });
    const typeRecs = Object.entries(byType).map(([type, d]) => {
      // Weight temps by rating
      let weightedSum = 0, weightTotal = 0;
      d.temps.forEach((t,i) => { weightedSum += t * d.ratings[i]; weightTotal += d.ratings[i]; });
      return { type, optimalTemp: Math.round(weightedSum / weightTotal), avgRating: (d.ratings.reduce((a,b)=>a+b,0)/d.ratings.length).toFixed(1), count: d.temps.length };
    }).filter(t => t.count >= 2).sort((a,b) => parseFloat(b.avgRating) - parseFloat(a.avgRating));
    return { top: ranked[0], combos: ranked.slice(0,3), typeRecs: typeRecs.slice(0,4) };
  }, [stash]);

  // ─── Session Timer ───────────────────────────────────
  useEffect(() => {
    if (sessionPhase !== "active" || isPaused || timeLeft <= 0) return;
    const t = setTimeout(() => { setTimeLeft(p=>p-1); setTotalDuration(p=>p+1); }, 1000);
    return () => clearTimeout(t);
  }, [sessionPhase, timeLeft, isPaused]);

  // ─── Complete Session ────────────────────────────────
  const completeSession = () => {
    const fTemp = selectedTempF + boosts*18;
    const zone = getZone(fTemp);
    // Find matching heat profile name for the base temp
    const matchedProfile = heatProfiles.find(p => p.tempF === selectedTempF);
    const profileName = matchedProfile ? matchedProfile.name : zone.name;
    const entry = { id:Date.now(), ...sessionData, finalTempF:fTemp, heatProfileName:profileName, duration:totalDuration, bestTemp:zone.name, ...ratingData, date:new Date().toISOString().split("T")[0], timeOfDay:new Date().getHours()<12?"Morning":new Date().getHours()<17?"Afternoon":"Evening" };
    const prev=[...stash]; const updated=[entry,...stash];
    setStash(updated);
    setProfile(p=>({...p,dabsSinceClean:(p.dabsSinceClean||0)+1}));
    const prevIds=ACHIEVEMENTS.filter(a=>a.check(prev)).map(a=>a.id);
    const newIds=ACHIEVEMENTS.filter(a=>a.check(updated)).filter(a=>!prevIds.includes(a.id));
    if(newIds.length){haptic.achievement();setToast(newIds[0]);setTimeout(()=>setToast(null),3500)}
    haptic.session_end();
    setVaporTrail(true);
    setTimeout(()=>setVaporTrail(false), 2500);
    resetSession();
  };

  const resetSession = () => { setSessionActive(false);setSessionPhase("details");setSessionData({brand:"",strain:"",classification:"Hybrid",type:"Live Rosin",photo:"",spotifyUrl:"",isGlobbing:false,brand2:"",strain2:"",type2:"Live Rosin"});setRatingData({vapor:0,taste:0,potency:0,rating:0,notes:"",effects:[],flavors:[],customRatings:{}});setBoosts(0);setTimeLeft(30);setTotalDuration(0);setIsPaused(false) };

  // Feature #6: Repeat last session
  const repeatLast = (item) => {

    setSelectedTempF(item.finalTempF || 510);
    setSessionPhase("select");

  };

  const handleClean = () => { setProfile(p=>({...p,dabsSinceClean:0,cleanHistory:[{date:new Date().toISOString().split("T")[0],sessions:p.dabsSinceClean||0},...(p.cleanHistory||[])]})) };
  const photoRef = useRef(null);
  const avg = k => { const v=stash.filter(s=>s[k]>0).map(s=>s[k]); return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):"—" };

  // ═══════════════════════════════════════════════════════

  // ═══════════════════════════════════════════════════════
  if (loading) {
    return (
      <div style={{height:"100vh",background:"#04040c",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
        <style>{`@keyframes loadPulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}@keyframes loadFade{from{opacity:0}to{opacity:1}}*{margin:0;padding:0;box-sizing:border-box}`}</style>
        <div style={{fontSize:48,animation:"loadPulse 1.5s ease-in-out infinite"}}>🔥</div>
        <div style={{textAlign:"center",animation:"loadFade 0.5s ease forwards"}}>
          <div style={{fontSize:11,letterSpacing:6,color:"rgba(255,255,255,0.2)",textTransform:"uppercase",fontFamily:"monospace"}}>Puffco</div>
          <div style={{fontSize:22,fontWeight:600,color:"white",marginTop:4,fontFamily:"system-ui,-apple-system,sans-serif"}}>Companion</div>
        </div>
        <div style={{fontSize:9,letterSpacing:3,color:"rgba(255,255,255,0.15)",textTransform:"uppercase",fontFamily:"monospace",marginTop:8}}>Loading...</div>
      </div>
    );
  }

  // ═══════════════════════════════════════════════════════
  // FEATURE #1: ONBOARDING
  // ═══════════════════════════════════════════════════════
  if (!onboarded) {
    return (
      <div style={{minHeight:"100vh",background:"#04040c",color:accent,fontFamily:"'Syne','Helvetica Neue',sans-serif",position:"relative",overflow:"hidden"}}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.7}}@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}*{margin:0;padding:0;box-sizing:border-box}`}</style>
        <SmokeBackground accent={accent} accent2={accent2} /><Starfield accent={accent} accentGrad={accentGrad} />
        <OnboardingFlow accent={accent} onDone={(name, device) => {

      </div>

  }

  return (
    <div style={{minHeight:"100vh",background:"#04040c",color:accent,fontFamily:"'Syne','Helvetica Neue',sans-serif",position:"relative"}}>
      <style>{`

          <div style={{fontSize:22,fontWeight:600,marginTop:8,animation:"achieveFade 0.5s ease 0.6s forwards",opacity:0}}>{toast.title}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:6,animation:"achieveFade 0.5s ease 0.8s forwards",opacity:0}}>{toast.desc}</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.15)",marginTop:24,animation:"achieveFade 0.5s ease 1s forwards",opacity:0,fontFamily:"'JetBrains Mono',monospace"}}>Tap to dismiss</div>
        </div>
      )}

      {/* Vapor Trail Animation */}
      {vaporTrail && (
        <div style={{position:"fixed",inset:0,zIndex:55,pointerEvents:"none"}}>
          <style>{`
            @keyframes vaporUp{0%{transform:translateY(0) translateX(0) scale(1);opacity:0.6}100%{transform:translateY(-100vh) translateX(var(--vx)) scale(0.3);opacity:0}}
            @keyframes vaporFade{0%{opacity:0}10%{opacity:1}100%{opacity:0}}
          `}</style>
          {Array.from({length:18}).map((_,i)=>{
            const left = 10 + Math.random()*80;
            const delay = Math.random()*1.2;
            const dur = 1.5 + Math.random()*1.5;
            const size = 4 + Math.random()*8;
            const vx = (Math.random()-0.5)*60;
            return <div key={i} style={{
              position:"absolute",bottom:"5%",left:`${left}%`,
              width:size,height:size,borderRadius:"50%",
              background:accent,
              opacity:0,
              "--vx":`${vx}px`,
              animation:`vaporUp ${dur}s ease-out ${delay}s forwards, vaporFade ${dur}s ease-out ${delay}s forwards`,
            }}/>;
          })}
        </div>
      )}

      {/* Session Overlay */}
      {sessionActive && <SessionOverlay sessionPhase={sessionPhase} setSessionPhase={setSessionPhase} sessionData={sessionData} setSessionData={setSessionData} ratingData={ratingData} setRatingData={setRatingData} selectedTempF={selectedTempF} setSelectedTempF={setSelectedTempF} timeLeft={timeLeft} setTimeLeft={setTimeLeft} totalDuration={totalDuration} boosts={boosts} setBoosts={setBoosts} isPaused={isPaused} setIsPaused={setIsPaused} accent={accent} heatProfiles={heatProfiles} activeHP={activeHP} completeSession={completeSession} onClose={resetSession} photoRef={photoRef} knownBrands={[...new Set(stash.map(s=>s.brand).filter(Boolean))].sort()} knownStrains={[...new Set(stash.map(s=>s.strain).filter(Boolean))].sort()} stash={stash} customRatingDims={customRatingDims.filter(d=>d.enabled)} />}

      <div style={{position:"relative",zIndex:1,maxWidth:440,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",padding:"0 18px"}}>

      {/* Session Detail Modal */}

      {/* Feature #23: Shareable Card */}

            <ML>Classification</ML>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>

            </div>
            <ML>Extract Type</ML>
            <select value={editingSession.type||"Live Rosin"} onChange={e=>setEditingSession(p=>({...p,type:e.target.value}))} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"10px 14px",fontSize:13,color:"white",outline:"none",appearance:"none",fontFamily:"'Syne',sans-serif",marginBottom:14}}>{EXTRACT_TYPES.map(t=><option key={t} value={t} style={{background:"#111"}}>{t}</option>)}</select>
            <ML>Ratings</ML>
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
              {[{k:"vapor",l:"Vapor"},{k:"taste",l:"Taste"},{k:"potency",l:"Potency"},{k:"rating",l:"Overall"}].map(m=><div key={m.k} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",width:60}}>{m.l}</span><div style={{display:"flex",gap:4}}>{[1,2,3,4,5].map(s=><button key={s} onClick={()=>setEditingSession(p=>({...p,[m.k]:s}))} style={{background:"none",border:"none",cursor:"pointer",padding:2,WebkitTapHighlightColor:"transparent"}}><Leaf size={18} filled={s<=(editingSession[m.k]||0)} accent={accent}/></button>)}</div></div>)}
            </div>
            <ML>Notes</ML>
            <Input rows={2} value={editingSession.notes||""} onChange={e=>setEditingSession(p=>({...p,notes:e.target.value}))} placeholder="Notes..." style={{marginBottom:14}} />
            <ML>Effects</ML>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
              {EFFECTS_LIST.map(e=>{const sel=(editingSession.effects||[]).includes(e.id);return<button key={e.id} onClick={()=>setEditingSession(p=>({...p,effects:sel?(p.effects||[]).filter(x=>x!==e.id):[...(p.effects||[]),e.id]}))} style={{padding:"4px 8px",borderRadius:8,fontSize:8,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",WebkitTapHighlightColor:"transparent",background:sel?`${accent}15`:"rgba(255,255,255,0.03)",border:`1px solid ${sel?accent+"40":"rgba(255,255,255,0.06)"}`,color:sel?accent:"rgba(255,255,255,0.35)"}}>{e.emoji} {e.label}</button>})}
            </div>
            <Btn accent={accent} onClick={()=>{setStash(p=>p.map(s=>s.id===editingSession.id?editingSession:s));setEditingSession(null)}}>Save Changes</Btn>
            <Btn secondary onClick={()=>setEditingSession(null)} style={{marginTop:8}}>Cancel</Btn>
          </div>
        </div>
      )}

      {/* Changelog Modal */}
      {changelogOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:75,background:"rgba(4,4,12,0.98)",overflowY:"auto"}} onPointerDown={e=>{if(e.target===e.currentTarget)setChangelogOpen(false)}}>
          <div style={{maxWidth:440,margin:"0 auto",padding:"max(70px, calc(env(safe-area-inset-top, 20px) + 50px)) 24px 40px"}}>
            <button onClick={()=>setChangelogOpen(false)} style={{position:"fixed",top:"max(16px, env(safe-area-inset-top, 16px))",right:16,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"50%",width:42,height:42,color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",zIndex:75,WebkitTapHighlightColor:"transparent","aria-label":"Close"}}>✕</button>

            <div style={{fontSize:10,letterSpacing:4,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>Changelog</div>
            <h2 style={{fontSize:22,fontWeight:600,marginBottom:24}}>What's New</h2>

            {[
              { version:"3.1.0", date:"2026", label:"Current", entries:[
                {type:"new",text:"Strain & brand autocomplete — previous entries suggest as you type to prevent duplicates"},
                {type:"new",text:"PFP frame rewards — 12 unique SVG frames unlocked at each XP level"},
                {type:"new",text:"Named accent themes — Hash, Live Rosin, Shatter, Diamonds, Terps, Ice Hash, Bubble, Rosin"},
                {type:"new",text:"Cleaning guide — step-by-step chamber soak walkthrough with pro tips in Care tab"},
                {type:"new",text:"Help center — How to Use guide, FAQ, and ticket submission system in Profile"},
                {type:"new",text:"PWA support — add to home screen, standalone mode, offline caching"},
                {type:"new",text:"Session step indicator — progress dots showing where you are in the session flow"},
                {type:"new",text:"Avatar photo upload — tap your profile pic to add a photo, shows in nav bar"},
                {type:"fix",text:"Session persistence — switched from localStorage to persistent storage API"},
                {type:"fix",text:"Click responsiveness — removed all backdrop-filter blur and heavy CSS transitions"},
                {type:"fix",text:"Smoke background performance — pre-rendered noise textures, zero per-frame computation"},
                {type:"fix",text:"Theme switching — instant accent color change via CSS custom properties"},
              ]},
              { version:"3.0.0", date:"2026", label:"Deep Space Noir", entries:[
                {type:"new",text:"Complete visual redesign — dark space noir aesthetic with glassmorphism panels"},
                {type:"new",text:"Animated smoke background — rising accent-colored smoke from the bottom"},
                {type:"new",text:"Custom flame icon — SVG flame in the nav bar colored to match your theme"},
                {type:"new",text:"Onboarding flow — 4-step first launch experience with profile setup"},
                {type:"new",text:"Repeat last session — one-tap shortcut at the top of the Stash tab"},
                {type:"new",text:"Profile stats summary — at-a-glance card with avg rating, brands, strains, fav temp"},
                {type:"new",text:"Strain encyclopedia — personal database of every strain with averaged ratings and effects"},
                {type:"new",text:"Session photos — upload jar photos during logging, displayed on cards and share cards"},
                {type:"new",text:"Custom heat profiles — create, edit, delete profiles with custom temps and colors"},
                {type:"new",text:"Shareable session cards — export styled PNG cards for sharing on social media"},
                {type:"new",text:"XP and leveling system — 12 ranks from Newbie to Dab God"},
                {type:"new",text:"11 achievements — including 2 secret achievements to discover"},
              ]},
              { version:"2.0.0", date:"2025", label:"Original", entries:[
                {type:"new",text:"Initial release — session logging, stats tracking, care timer"},
                {type:"new",text:"4 default heat profiles — Blue, Green, Red, White"},
                {type:"new",text:"Effects tracking — 11 effects to tag on each session"},
                {type:"new",text:"Rating system — vapor, taste, potency, and overall ratings"},
              ]},
            ].map(release => (
              <Glass key={release.version} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:14,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>v{release.version}</span>
                    {release.label&&<span style={{fontSize:8,padding:"3px 8px",borderRadius:8,background:`${accent}15`,color:accent,fontFamily:"'JetBrains Mono',monospace",letterSpacing:1,textTransform:"uppercase"}}>{release.label}</span>}
                  </div>
                  <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>{release.date}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {release.entries.map((e,i) => (
                    <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                      <span style={{
                        fontSize:7,padding:"2px 6px",borderRadius:6,flexShrink:0,marginTop:2,
                        fontFamily:"'JetBrains Mono',monospace",letterSpacing:1,textTransform:"uppercase",fontWeight:600,

                      }}>{e.type}</span>
                      <span style={{fontSize:11,color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>{e.text}</span>
                    </div>
                  ))}
                </div>
              </Glass>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// FEATURE #1: ONBOARDING FLOW
// ═══════════════════════════════════════════════════════
function OnboardingFlow({ accent, onDone }) {
  const [step, setStep] = useState(0);
  const [name, setName] = useState("");
  const [device, setDevice] = useState("Peak");
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  const steps = [
    { title:"Welcome to Puffco Companion", sub:"Track every dab. Rate your concentrates. Know your preferences.", icon:"🔥" },
    { title:"Log Your Sessions", sub:"Record strain, temp, ratings, effects, and photos. Build your personal concentrate library.", icon:"📓" },
    { title:"Your Stats, Your Way", sub:"See trends, streaks, and what hits different. The more you log, the smarter it gets.", icon:"📊" },
  ];
  if (step < 3) {
    const s = steps[step];
    return (
      <div style={{position:"relative",zIndex:1,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 32px"}}>
        <div className="fu fu1" style={{fontSize:72,marginBottom:28}}>{s.icon}</div>
        <h1 className="fu fu2" style={{fontSize:22,fontWeight:300,letterSpacing:3,textTransform:"uppercase",textAlign:"center",marginBottom:12}}>{s.title}</h1>
        <p className="fu fu3" style={{color:"rgba(255,255,255,0.4)",textAlign:"center",fontSize:13,lineHeight:1.6,maxWidth:300,marginBottom:40}}>{s.sub}</p>
        <div style={{display:"flex",gap:6,marginBottom:32}}>{[0,1,2,3,4].map(i=><div key={i} style={{width:i===step?24:8,height:4,borderRadius:2,background:i===step?"white":"rgba(255,255,255,0.15)"}}/>)}</div>
        <Btn accent="white" onClick={()=>setStep(step+1)} style={{maxWidth:300}}>Next</Btn>
        <button onClick={()=>setStep(3)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.25)",fontSize:10,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",marginTop:16}}>Skip</button>
      </div>
    );
  }
  if (step === 3) {
    return (
      <div style={{position:"relative",zIndex:1,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 32px"}}>
        <h1 className="fu fu1" style={{fontSize:22,fontWeight:300,letterSpacing:3,textTransform:"uppercase",textAlign:"center",marginBottom:8}}>Set Up Your Profile</h1>
        <p className="fu fu2" style={{color:"rgba(255,255,255,0.35)",fontSize:12,marginBottom:28}}>You can change these later</p>
        <div className="fu fu3" style={{width:"100%",maxWidth:300,marginBottom:16}}>
          <ML>Your Name</ML>
          <Input value={name} onChange={e=>setName(e.target.value)} placeholder="What should we call you?" />
        </div>
        <div className="fu fu4" style={{width:"100%",maxWidth:300,marginBottom:28}}>
          <ML>Your Device</ML>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {["Peak","Peak Pro","Pivot","Proxy","Other"].map(d=><button key={d} onClick={()=>setDevice(d)} style={{padding:10,borderRadius:10,fontSize:10,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,background:device===d?"white":"rgba(255,255,255,0.04)",color:device===d?"#000":"rgba(255,255,255,0.4)",border:`1px solid ${device===d?"white":"rgba(255,255,255,0.08)"}`}}>{d}</button>)}
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:32}}>{[0,1,2,3,4].map(i=><div key={i} style={{width:i===step?24:8,height:4,borderRadius:2,background:i===step?"white":"rgba(255,255,255,0.15)"}}/>)}</div>
        <Btn accent="white" onClick={()=>setStep(4)} style={{maxWidth:300}}>Next</Btn>
      </div>
    );
  }
  // Step 4: Add to Home Screen guide
  return (
    <div style={{position:"relative",zIndex:1,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 32px"}}>
      <div className="fu fu1" style={{fontSize:48,marginBottom:20}}>📲</div>
      <h1 className="fu fu2" style={{fontSize:20,fontWeight:300,letterSpacing:3,textTransform:"uppercase",textAlign:"center",marginBottom:8}}>Install the App</h1>
      <p className="fu fu3" style={{color:"rgba(255,255,255,0.35)",fontSize:12,textAlign:"center",marginBottom:24,maxWidth:280}}>
        {isStandalone?"You're already running as an app — you're all set!":"Add Puffco Companion to your home screen for the best experience."}
      </p>
      {!isStandalone&&(
        <div className="fu fu4" style={{width:"100%",maxWidth:300,marginBottom:28}}>
          {isIOS?(
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>1</div>
                <div><div style={{fontSize:13,fontWeight:500}}>Tap the Share button</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>The square with an arrow at the bottom of Safari</div></div>
              </div>

}

// ─── Autocomplete Input ────────────────────────────────
function AutoInput({ value, onChange, suggestions, placeholder, style }) {
  const [open, setOpen] = useState(false);
  const [focused, setFocused] = useState(false);
  const q = value.toLowerCase().trim();
  const filtered = q ? suggestions.filter(s => s.toLowerCase().includes(q) && s.toLowerCase() !== q) : suggestions;
  const show = focused && filtered.length > 0;

  return (
    <div style={{ position: "relative" }}>
      <input
        value={value}
        onChange={e => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => { setFocused(true); setOpen(true); }}
        onBlur={() => setTimeout(() => { setFocused(false); setOpen(false); }, 150)}
        placeholder={placeholder}
        style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "10px 14px", fontSize: 13, color: "white", outline: "none", fontFamily: "'Syne','Helvetica Neue',sans-serif", ...style }}
      />
      {show && open && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, zIndex: 10, marginTop: 4,
          background: "rgba(12,12,24,0.95)", border: "1px solid rgba(255,255,255,0.1)",
          borderRadius: 12, overflow: "hidden", maxHeight: 160, overflowY: "auto",
        }}>
          {filtered.slice(0, 8).map(s => (
            <button key={s} onMouseDown={e => { e.preventDefault(); onChange(s); setOpen(false); }}
              style={{
                display: "block", width: "100%", textAlign: "left", padding: "10px 14px",
                background: "transparent", border: "none", borderBottom: "1px solid rgba(255,255,255,0.04)",
                color: "rgba(255,255,255,0.7)", fontSize: 12, cursor: "pointer",
                fontFamily: "'Syne','Helvetica Neue',sans-serif",
                WebkitTapHighlightColor: "transparent",
              }}>
              {s}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// SESSION OVERLAY (includes #16 photo upload)

function SessionOverlay({sessionPhase,setSessionPhase,sessionData,setSessionData,ratingData,setRatingData,selectedTempF,setSelectedTempF,timeLeft,setTimeLeft,totalDuration,boosts,setBoosts,isPaused,setIsPaused,accent,heatProfiles,activeHP,completeSession,onClose,photoRef,knownBrands,knownStrains,stash,customRatingDims}) {

                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>

                    width:isActive?28:isDone?22:18, height:isActive?28:isDone?22:18,
                    borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
                    
                    background: isActive ? accent : isDone ? `${accent}40` : "rgba(255,255,255,0.04)",
                    border: `1.5px solid ${isActive ? accent : isDone ? accent+"60" : "rgba(255,255,255,0.08)"}`,
                    boxShadow: isActive ? `0 0 12px ${accent}40` : "none",
                  }}>
                    {isDone ? (
                      <span style={{fontSize:10,color:"white"}}>✓</span>
                    ) : (
                      <span style={{fontSize:8,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:isActive?"#000":"rgba(255,255,255,0.25)"}}>{i+1}</span>

                  </div>
                  <span style={{
                    fontSize:7, letterSpacing:1.5, textTransform:"uppercase",
                    fontFamily:"'JetBrains Mono',monospace", marginTop:5,
                    color: isActive ? accent : isDone ? "rgba(255,255,255,0.4)" : "rgba(255,255,255,0.15)",
                    fontWeight: isActive ? 700 : 400,
                    
                  }}>{stepLabels[i]}</span>
                </div>

                  <div style={{
                    flex:1, height:1.5, borderRadius:1, margin:"0 -4px", marginBottom:16,
                    background: isDone ? `${accent}50` : "rgba(255,255,255,0.06)",
                    transition:"background 0.4s",
                  }} />
                )}
              </div>
            );
          })}
        </div>

        {/* DETAILS — includes #16 photo */}
        {sessionPhase==="details"&&(
          <div className="fu fu1" style={{flex:1}}>

            {/* Photo upload */}

            {sessionData.photo?(
              <div style={{position:"relative",width:"100%",height:140,borderRadius:14,overflow:"hidden",marginBottom:16,border:"1px solid rgba(255,255,255,0.08)"}}>

                <ML>Second Strain</ML>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:10}}>
                  <AutoInput value={sessionData.brand2} onChange={v=>setSessionData(p=>({...p,brand2:v}))} suggestions={knownBrands||[]} placeholder="Brand 2"/>

            <Btn accent={accent} disabled={!sessionData.brand.trim()||!sessionData.strain.trim()} onClick={()=>{if(sessionData.brand.trim()&&sessionData.strain.trim()){

              let suggestedTemp = TEMP_SUGGESTIONS[sessionData.type]||activeHP.tempF;

                <Btn accent="white" onClick={()=>setSessionPhase("effects")}>End Session</Btn>
              </div>
            )}
          </div>
        )}

        {/* EFFECTS */}
        {sessionPhase==="effects"&&(
          <div className="fu fu1" style={{flex:1}}>
            <div style={{textAlign:"center",marginBottom:24}}><h2 style={{fontSize:22,fontWeight:300,letterSpacing:4,textTransform:"uppercase"}}>How Do You Feel?</h2></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
              {EFFECTS_LIST.map(e=>{const sel=ratingData.effects.includes(e.id);return <button key={e.id} onClick={()=>setRatingData(p=>({...p,effects:sel?p.effects.filter(x=>x!==e.id):[...p.effects,e.id]}))} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"14px 8px",borderRadius:14,cursor:"pointer",background:sel?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${sel?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.06)"}`,color:sel?"white":"rgba(255,255,255,0.4)"}}><span style={{fontSize:22}}>{e.emoji}</span><span style={{fontSize:8,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,textAlign:"center",lineHeight:1.3}}>{e.label}</span></button>})}
            </div>
            <Btn accent="white" onClick={()=>setSessionPhase("rating")}>Next — Rate It</Btn>
            <Btn secondary onClick={()=>setSessionPhase("rating")} style={{marginTop:8}}>Skip</Btn>
          </div>
        )}

        {/* RATING */}
        {sessionPhase==="rating"&&(
          <div className="fu fu1" style={{flex:1}}>
            <div style={{textAlign:"center",marginBottom:24}}><h2 style={{fontSize:22,fontWeight:300,letterSpacing:4,textTransform:"uppercase"}}>Rate Session</h2></div>
            <div style={{display:"flex",flexDirection:"column",gap:18,marginBottom:24}}>
              {[{key:"vapor",label:"Vapor Quality"},{key:"taste",label:"Taste / Terps"},{key:"potency",label:"Potency"},{key:"rating",label:"Overall"}].map(m=><div key={m.key}><ML>{m.label}</ML><div style={{display:"flex",gap:6}}>{[1,2,3,4,5].map(s=><button key={s} onClick={()=>{haptic.light();setRatingData(p=>({...p,[m.key]:s}))}} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Leaf size={24} filled={s<=ratingData[m.key]} accent={accent}/></button>)}</div></div>)}
              {customRatingDims&&customRatingDims.length>0&&customRatingDims.map(d=><div key={d.id}><ML>{d.label}</ML><div style={{display:"flex",gap:6}}>{[1,2,3,4,5].map(s=><button key={s} onClick={()=>{haptic.light();setRatingData(p=>({...p,customRatings:{...(p.customRatings||{}),[d.id]:s}}))}} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Leaf size={24} filled={s<=(ratingData.customRatings||{})[d.id]} accent={accent}/></button>)}</div></div>)}
              <div><ML>Notes</ML><Input rows={2} value={ratingData.notes} onChange={e=>setRatingData(p=>({...p,notes:e.target.value}))} placeholder="Flavor, effects, thoughts..."/></div>
            </div>
            {/* Flavor Tags — post-dab */}
            <ML>Flavor Notes</ML>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
              {FLAVORS.map(f=>{const sel=(ratingData.flavors||[]).includes(f);return(
                <button key={f} onClick={()=>setRatingData(p=>({...p,flavors:sel?(p.flavors||[]).filter(x=>x!==f):[...(p.flavors||[]),f]}))}
                  style={{padding:"5px 10px",borderRadius:10,fontSize:9,letterSpacing:1,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontWeight:500,WebkitTapHighlightColor:"transparent",
                    background:sel?`${accent}15`:"rgba(255,255,255,0.03)",border:`1px solid ${sel?accent+"40":"rgba(255,255,255,0.06)"}`,color:sel?accent:"rgba(255,255,255,0.35)"}}>
                  {f}
                </button>
              )})}
            </div>
            <Btn accent="white" onClick={completeSession}>Save Session</Btn>
            <Btn secondary onClick={completeSession} style={{marginTop:8}}>Skip & Save</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Flip Session Card ─────────────────────────────────
// Tap = flip to show stats back. Long press (300ms) = open full detail modal.
function FlipSessionCard({ item, accent, onSelect }) {
  const [flipped, setFlipped] = useState(false);
  const [frontH, setFrontH] = useState(0);
  const [backH, setBackH] = useState(0);
  const frontRef = useRef(null);
  const backRef = useRef(null);
  const pressTimer = useRef(null);
  const didLongPress = useRef(false);

  const z = getZone(item.finalTempF || 500);

  useEffect(() => {
    if (frontRef.current) setFrontH(frontRef.current.offsetHeight);
    if (backRef.current) setBackH(backRef.current.offsetHeight);
  }, [item]);

  const onPointerDown = () => {
    didLongPress.current = false;
    pressTimer.current = setTimeout(() => {
      didLongPress.current = true;
      onSelect(item);
      haptic.medium();
    }, 300);
  };
  const onPointerUp = () => {
    clearTimeout(pressTimer.current);
    if (!didLongPress.current) {
      setFlipped(f => !f);
      // Re-measure after flip in case content changed
      requestAnimationFrame(() => {
        if (frontRef.current) setFrontH(frontRef.current.offsetHeight);
        if (backRef.current) setBackH(backRef.current.offsetHeight);
      });
    }
  };
  const onPointerLeave = () => { clearTimeout(pressTimer.current); };

  return (
    <div style={{ perspective: 800, WebkitTapHighlightColor: "transparent" }}>
      <div
        onPointerDown={onPointerDown}
        onPointerUp={onPointerUp}
        onPointerLeave={onPointerLeave}
        style={{
          position: "relative", transformStyle: "preserve-3d", cursor: "pointer",
          transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
          transition: "transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), height 0.4s ease",
          height: flipped ? (backH || "auto") : (frontH || "auto"),
        }}
      >
        {/* ─── FRONT ─── */}
        <div ref={frontRef} style={{ backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden", position: "absolute", top: 0, left: 0, right: 0 }}>
          <Glass style={{ padding: 0, overflow: "hidden" }}>
            {item.photo && <div style={{ width: "100%", height: 100, overflow: "hidden" }}><img src={item.photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /></div>}
            <div style={{ padding: "14px 16px" }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>{item.brand}</div>
                  <div style={{ fontSize: 14, fontWeight: 500, marginTop: 3 }}>{item.strain}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", fontFamily: "'JetBrains Mono',monospace" }}>{item.type}</span>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.15)" }}>·</span>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", fontFamily: "'JetBrains Mono',monospace" }}>{item.classification}</span>
                  </div>
                  {item.notes && <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", fontStyle: "italic", marginTop: 6, lineHeight: 1.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>"{item.notes}"</div>}
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, flexShrink: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 12, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)" }}><div style={{ width: 6, height: 6, borderRadius: "50%", background: z.hex }} /><span style={{ fontSize: 9, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace", color: "rgba(255,255,255,0.5)" }}>{item.heatProfileName||z.name} · {item.finalTempF}°</span></div>
                  <div style={{ display: "flex", gap: 1 }}>{[1, 2, 3, 4, 5].map(s => <Leaf key={s} size={9} filled={s <= item.rating} accent={accent} />)}</div>
                  <span style={{ fontSize: 8, color: "rgba(255,255,255,0.2)", fontFamily: "'JetBrains Mono',monospace" }}>{item.date}</span>
                </div>
              </div>
              {item.effects?.length > 0 && <div style={{ display: "flex", gap: 4, marginTop: 8, flexWrap: "wrap" }}>{item.effects.slice(0, 4).map(eid => { const e = EFFECTS_LIST.find(x => x.id === eid); return e ? <span key={eid} style={{ fontSize: 8, padding: "3px 7px", borderRadius: 10, background: `${accent}12`, color: accent, fontFamily: "'JetBrains Mono',monospace" }}>{e.emoji} {e.label}</span> : null; })}{item.effects.length > 4 && <span style={{ fontSize: 8, color: "rgba(255,255,255,0.2)" }}>+{item.effects.length - 4}</span>}</div>}
              {item.flavors?.length > 0 && <div style={{ display: "flex", gap: 4, marginTop: 6, flexWrap: "wrap" }}>{item.flavors.slice(0, 4).map(f => <span key={f} style={{ fontSize: 7, padding: "2px 6px", borderRadius: 8, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.35)", fontFamily: "'JetBrains Mono',monospace" }}>{f}</span>)}{item.flavors.length > 4 && <span style={{ fontSize: 7, color: "rgba(255,255,255,0.15)" }}>+{item.flavors.length - 4}</span>}</div>}
            </div>
            <div style={{ position: "absolute", bottom: 6, right: 10, fontSize: 7, color: "rgba(255,255,255,0.12)", fontFamily: "'JetBrains Mono',monospace" }}>tap to flip · hold to open</div>
          </Glass>
        </div>

        {/* ─── BACK (stats) ─── */}
        <div ref={backRef} style={{
          backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
          transform: "rotateY(180deg)", position: "absolute", top: 0, left: 0, right: 0,
        }}>
          <Glass style={{ overflow: "hidden" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>{item.brand}</div>
                <div style={{ fontSize: 13, fontWeight: 500, marginTop: 2 }}>{item.strain}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 12, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)" }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: z.hex }} />
                <span style={{ fontSize: 9, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace", color: "rgba(255,255,255,0.5)" }}>{item.heatProfileName||z.name} · {item.finalTempF}°F</span>
              </div>
            </div>
            {/* Rating bars */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
              {[{ k: "vapor", l: "Vapor" }, { k: "taste", l: "Taste" }, { k: "potency", l: "Potency" }, { k: "rating", l: "Overall" }].map(m => (
                <div key={m.k} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 8, color: "rgba(255,255,255,0.3)", fontFamily: "'JetBrains Mono',monospace", width: 44 }}>{m.l}</span>
                  <div style={{ flex: 1, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.05)", overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 2, width: `${(item[m.k] || 0) * 20}%`, background: accent }} />
                  </div>
                  <span style={{ fontSize: 8, color: "rgba(255,255,255,0.4)", fontFamily: "'JetBrains Mono',monospace", width: 10, textAlign: "right" }}>{item[m.k] || 0}</span>
                </div>
              ))}
            </div>
            {/* Quick stats row */}
            <div style={{ display: "flex", gap: 8, marginBottom: item.effects?.length > 0 ? 10 : 0 }}>
              <div style={{ flex: 1, padding: "8px 0", borderRadius: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>{item.duration > 0 ? `${Math.floor(item.duration / 60)}:${(item.duration % 60).toString().padStart(2, "0")}` : "—"}</div>
                <div style={{ fontSize: 6, color: "rgba(255,255,255,0.2)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace", marginTop: 2 }}>Duration</div>
              </div>
              <div style={{ flex: 1, padding: "8px 0", borderRadius: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>{item.timeOfDay || "—"}</div>
                <div style={{ fontSize: 6, color: "rgba(255,255,255,0.2)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace", marginTop: 2 }}>Time</div>
              </div>
              <div style={{ flex: 1, padding: "8px 0", borderRadius: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>{item.date}</div>
                <div style={{ fontSize: 6, color: "rgba(255,255,255,0.2)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace", marginTop: 2 }}>Date</div>
              </div>
            </div>
            {item.effects?.length > 0 && <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>{item.effects.map(eid => { const e = EFFECTS_LIST.find(x => x.id === eid); return e ? <span key={eid} style={{ fontSize: 7, padding: "3px 7px", borderRadius: 8, background: `${accent}12`, color: accent, fontFamily: "'JetBrains Mono',monospace" }}>{e.emoji} {e.label}</span> : null; })}</div>}
            <div style={{ position: "absolute", bottom: 6, right: 10, fontSize: 7, color: "rgba(255,255,255,0.12)", fontFamily: "'JetBrains Mono',monospace" }}>tap to flip · hold to open</div>
          </Glass>
        </div>
      </div>
    </div>
  );
}

function StashTab({stash,accent,stashFilter,setStashFilter,stashSearch,setStashSearch,onSelect,onRepeat,strainMap,setStrainView,setTab}) {
  const [viewMode, setViewMode] = useState("list"); // list or shelf
  const lastSession = stash[0];
  let filtered = stash;
  if(stashFilter!=="All"){if(FILTER_MAP[stashFilter])filtered=filtered.filter(s=>FILTER_MAP[stashFilter].includes(s.type));else filtered=filtered.filter(s=>!Object.values(FILTER_MAP).flat().includes(s.type))}
  if(stashSearch.trim()){const q=stashSearch.toLowerCase();filtered=filtered.filter(s=>s.strain?.toLowerCase().includes(q)||s.brand?.toLowerCase().includes(q))}

  return (
    <div>
      <div className="fu fu1" style={{padding:"22px 0 18px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div><h2 style={{fontSize:20,fontWeight:600,letterSpacing:-0.3}}>Session Log</h2><p style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:5,fontFamily:"'JetBrains Mono',monospace"}}>{stash.length} dab{stash.length!==1?"s":""} logged</p></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {/* View toggle */}
          <div style={{display:"flex",borderRadius:10,overflow:"hidden",border:"1px solid rgba(255,255,255,0.08)"}}>
            <button onClick={()=>setViewMode("list")} style={{padding:"8px 12px",background:viewMode==="list"?`${accent}20`:"transparent",border:"none",color:viewMode==="list"?accent:"rgba(255,255,255,0.25)",fontSize:16,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>☰</button>
            <button onClick={()=>setViewMode("shelf")} style={{padding:"8px 12px",background:viewMode==="shelf"?`${accent}20`:"transparent",border:"none",color:viewMode==="shelf"?accent:"rgba(255,255,255,0.25)",fontSize:16,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>⊞</button>
          </div>
          {Object.keys(strainMap).length>0&&<button onClick={()=>setTab("encyclopedia")} style={{background:"none",border:"none",color:accent,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,cursor:"pointer"}}>Encyclopedia →</button>}
        </div>
      </div>

      {/* Feature #6: Repeat Last */}
      {lastSession&&lastSession.brand!=="Quick"&&(
        <Glass className="fu fu2" glow={accent} onClick={()=>onRepeat(lastSession)} style={{padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:`${accent}15`,border:`1.5px solid ${accent}40`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:16}}>🔄</span></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:9,color:accent,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>Repeat Last</div>
            <div style={{fontSize:12,fontWeight:500,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lastSession.brand} — {lastSession.strain}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><div style={{width:6,height:6,borderRadius:"50%",background:getZone(lastSession.finalTempF||510).hex}}/><span style={{fontSize:9,color:"rgba(255,255,255,0.4)",fontFamily:"'JetBrains Mono',monospace"}}>{lastSession.finalTempF}°</span></div>
        </Glass>
      )}

      {stash.length===0?(
        <div style={{textAlign:"center",padding:"60px 0"}}><div style={{fontSize:44,opacity:0.15,marginBottom:12}}>🌿</div><p style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>No sessions yet. Hit the flame to start.</p></div>
      ):(
        <>
          <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
            {["All","Rosin","Hash","Resin","Other"].map(f=><button key={f} onClick={()=>setStashFilter(f)} style={{padding:"6px 14px",borderRadius:20,whiteSpace:"nowrap",fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:600,cursor:"pointer",flexShrink:0,fontFamily:"'JetBrains Mono',monospace",background:stashFilter===f?accent:"transparent",color:stashFilter===f?"#000":"rgba(255,255,255,0.35)",border:`1px solid ${stashFilter===f?accent:accent+"30"}`}}>{f}</button>)}
          </div>
          <div style={{position:"relative",marginBottom:14}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"rgba(255,255,255,0.2)"}}>⌕</span>
            <Input value={stashSearch} onChange={e=>setStashSearch(e.target.value)} placeholder="Search strain or brand..." style={{paddingLeft:34}} />
            {stashSearch&&<button onClick={()=>setStashSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:14}}>✕</button>}
          </div>
          {viewMode==="shelf"?(
            /* Jar Shelf View (#25) */
            <div>
              <ML>{Object.keys(strainMap).length} Unique Strains</ML>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                {Object.entries(strainMap).sort((a,b)=>b[1].sessions.length-a[1].sessions.length).map(([key,data])=>{
                  const avgR=data.sessions.filter(s=>s.rating>0).length?(data.sessions.reduce((a,s)=>a+(s.rating||0),0)/data.sessions.filter(s=>s.rating>0).length):0;
                  const photo=data.sessions.find(s=>s.photo)?.photo;
                  return(
                    <Glass key={key} onClick={()=>setStrainView(key)} style={{padding:0,cursor:"pointer",overflow:"hidden",textAlign:"center"}}>
                      <div style={{width:"100%",height:70,background:`${accent}08`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                        {photo?<img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:0.7}}/>:
                        <div style={{fontSize:28,opacity:0.15}}>🫙</div>}
                      </div>
                      <div style={{padding:"8px 6px"}}>
                        <div style={{fontSize:8,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.strain}</div>
                        <div style={{fontSize:7,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{data.brand}</div>
                        <div style={{display:"flex",justifyContent:"center",gap:1,marginTop:4}}>{[1,2,3,4,5].map(s=><Leaf key={s} size={6} filled={s<=Math.round(avgR)} accent={accent}/>)}</div>
                        <div style={{fontSize:7,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{data.sessions.length}×</div>
                      </div>
                    </Glass>
                  );
                })}
              </div>
            </div>
          ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filtered.length===0?<div style={{textAlign:"center",padding:"40px 0"}}><p style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{stashSearch?`No results for "${stashSearch}"`:"No sessions in this category"}</p></div>
            :filtered.map(item=><FlipSessionCard key={item.id} item={item} accent={accent} onSelect={onSelect} />)}
          </div>
          )}
        </>
      )}
    </div>
  );
}

function StatsTab({stash,accent,lvl,xp,streak,unlocked,avg,tempPredictor}) {
