  const hasData = stash.length > 0;
  return (
    <div>
      <div className="fu fu1" style={{padding:"22px 0 18px"}}><h2 style={{fontSize:20,fontWeight:600}}>Stats</h2></div>
      <Glass className="fu fu2" glow={accent} style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
          <div style={{width:46,height:46,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:`${accent}18`,border:`1.5px solid ${accent}50`}}>{lvl.emoji}</div>
          <div style={{flex:1}}><div style={{display:"flex",alignItems:"baseline",gap:8}}><span style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:accent}}>Level {lvl.level}</span><span style={{fontSize:16,fontWeight:500}}>{lvl.title}</span></div><div style={{fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{xp.toLocaleString()} XP</div></div>
        </div>
        {lvl.next&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:8,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{lvl.progressXP}/{lvl.neededXP} XP</span><span style={{fontSize:8,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>Next: {lvl.next.title}</span></div><div style={{height:8,borderRadius:4,background:"rgba(255,255,255,0.05)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,width:`${lvl.progress*100}%`,background:accent,transition:"width 1s"}}/></div></div>}
      </Glass>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {l:"Sessions",v:hasData?stash.length:"0"},
          {l:"Streak",v:hasData?streak+"d":"0d"},
          {l:"Avg Rating",v:hasData&&avg("rating")!=="—"?avg("rating")+"★":"N/A"},
          {l:"Time",v:hasData?Math.floor(stash.reduce((a,b)=>a+(b.duration||0),0)/60)+"m":"0m"},
        ].map((s,i)=><Glass key={i} style={{padding:16}}><div style={{fontSize:20,fontFamily:"'JetBrains Mono',monospace",fontWeight:300}}>{s.v}</div><div style={{fontSize:8,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{s.l}</div></Glass>)}
      </div>
      <Glass style={{marginBottom:14}}><ML>Temp Distribution</ML><div style={{display:"flex",alignItems:"flex-end",gap:8,height:70,marginTop:10}}>{HEAT_ZONES.map(z=>{const c=tempCounts[z.name]||0;const mx=Math.max(...Object.values(tempCounts),1);return <div key={z.name} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}>{c}</span><div style={{width:"100%",height:`${hasData?(c/mx)*50:0}px`,borderRadius:5,background:`linear-gradient(to top,${z.hex}40,${z.hex}10)`,border:`1px solid ${z.hex}20`}}/><div style={{width:7,height:7,borderRadius:"50%",background:z.hex}}/></div>})}</div></Glass>
      <Glass style={{marginBottom:14}}><ML>Achievements · {unlocked.length}/{ACHIEVEMENTS.filter(a=>!a.secret||a.check(stash)).length}</ML><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>{ACHIEVEMENTS.filter(a=>!a.secret||a.check(stash)).map(a=><AchievementBadge key={a.id} achievement={a} earned={a.check(stash)} accent={accent} />)}</div></Glass>

      {/* Potency Prediction */}
      <Glass style={{marginBottom:14}}>
        <ML>Potency Prediction</ML>
        {(()=>{
          if(stash.length<5) return <p style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>Log 5+ sessions to unlock predictions</p>;
          const brands={};
          stash.forEach(s=>{if(s.brand&&s.rating>0){if(!brands[s.brand])brands[s.brand]={total:0,count:0,strains:new Set()};brands[s.brand].total+=s.rating;brands[s.brand].count++;brands[s.brand].strains.add(s.strain)}});
          const ranked=Object.entries(brands).filter(([,v])=>v.count>=2).map(([name,v])=>({name,avg:(v.total/v.count).toFixed(1),count:v.count,strains:v.strains.size})).sort((a,b)=>b.avg-a.avg).slice(0,3);
          if(!ranked.length) return <p style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>Need more rated sessions to predict</p>;
          const zoneRatings={};
          stash.forEach(s=>{if(s.rating>0){const z=getZone(s.finalTempF||500).name;if(!zoneRatings[z])zoneRatings[z]={total:0,count:0};zoneRatings[z].total+=s.rating;zoneRatings[z].count++}});
          const bestZone=Object.entries(zoneRatings).map(([n,v])=>({name:n,avg:v.total/v.count})).sort((a,b)=>b.avg-a.avg)[0];
          return <>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",lineHeight:1.5,marginBottom:12}}>Based on your {stash.length} sessions, here's what hits hardest:</p>
            {ranked.map((b,i)=>(
              <div key={b.name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<ranked.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                <span style={{fontSize:14,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:i===0?accent:"rgba(255,255,255,0.4)",width:20}}>{i===0?"🏆":i===1?"🥈":"🥉"}</span>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{b.name}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{b.count} sessions · {b.strains} strains</div></div>
                <span style={{fontSize:14,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{b.avg}★</span>
              </div>
            ))}
            {bestZone&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}>Your sweet spot: </span>
              <span style={{fontSize:10,fontWeight:600}}>{bestZone.name}</span>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}> zone — avg {bestZone.avg.toFixed(1)}★</span>
            </div>}
          </>;
        })()}
      </Glass>

      {/* Optimal Temp Predictor */}
      <Glass style={{marginBottom:14}}>
        <ML>Optimal Temp Predictor</ML>
        {(()=>{
          if(!tempPredictor) return <p style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>Log 5+ rated sessions to unlock temp predictions</p>;
          return <>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",lineHeight:1.5,marginBottom:12}}>Your highest-rated setup based on {stash.length} sessions:</p>
            <div style={{padding:"12px 14px",borderRadius:12,background:`${accent}08`,border:`1px solid ${accent}20`,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>{tempPredictor.top.type}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{tempPredictor.top.zone} zone · {tempPredictor.top.time||"Any time"}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:300,fontFamily:"'JetBrains Mono',monospace"}}>{tempPredictor.top.avgTemp}°F</div>
                  <div style={{fontSize:9,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>{tempPredictor.top.avgRating.toFixed(1)}★ avg</div>
                </div>
              </div>
            </div>
            {tempPredictor.typeRecs.length>0&&<><ML style={{marginTop:8}}>By Extract Type</ML>
            {tempPredictor.typeRecs.map(t=>(
              <div key={t.type} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <span style={{fontSize:11}}>{t.type}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:12,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{t.optimalTemp}°F</span>
                  <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}>{t.avgRating}★ · {t.count}x</span>
                </div>
              </div>
            ))}</>}
          </>;
        })()}
      </Glass>

      {/* Constellation Map */}
      <Glass style={{marginBottom:14}}>
        <ML>Strain Constellation</ML>
        {(()=>{
          if(stash.length<3) return <p style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>Log 3+ unique strains to map your constellation</p>;
          const strains={};
          stash.forEach(s=>{
            const key=`${s.brand}|||${s.strain}`;
            if(!strains[key])strains[key]={brand:s.brand,strain:s.strain,count:0,avgRating:0,total:0,type:s.type};
            strains[key].count++;strains[key].total+=(s.rating||0);
          });
          const stars=Object.values(strains).map(s=>({...s,avgRating:s.count>0?s.total/s.count:0}));
          if(stars.length<3) return <p style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>Log 3+ unique strains to map your constellation</p>;
          const hash=(str)=>{let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0}return h};
          const positioned=stars.map(s=>{
            const h1=hash(s.brand+s.strain);const h2=hash(s.strain+s.brand);
            return{...s,x:15+Math.abs(h1%280),y:15+Math.abs(h2%170),size:Math.max(2,Math.min(6,s.count*1.5+s.avgRating*0.5))};
          });
          const brandGroups={};positioned.forEach(s=>{if(!brandGroups[s.brand])brandGroups[s.brand]=[];brandGroups[s.brand].push(s)});
          const lines=[];
          Object.values(brandGroups).forEach(group=>{for(let i=0;i<group.length-1;i++)lines.push({x1:group[i].x,y1:group[i].y,x2:group[i+1].x,y2:group[i+1].y})});
          return <>
            <p style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginBottom:8}}>Each star is a strain. Lines connect same brand. Bigger = more sessions.</p>
            <svg viewBox="0 0 310 200" style={{width:"100%",height:"auto"}}>
              {lines.map((l,i)=><line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={accent} strokeWidth="0.5" opacity="0.2"/>)}
              {positioned.map((s,i)=>(
                <g key={i}>
                  <circle cx={s.x} cy={s.y} r={s.size+3} fill={accent} opacity="0.08"/>
                  <circle cx={s.x} cy={s.y} r={s.size} fill={s.avgRating>=4?accent:s.avgRating>=3?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.2)"}/>
                  <text x={s.x} y={s.y+s.size+8} textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="4" fontFamily="'JetBrains Mono',monospace">{s.strain.slice(0,12)}</text>
                </g>
              ))}
            </svg>
          </>;
        })()}
      </Glass>
    </div>
  );
}

function CareTab({profile,accent,onClean,setProfile}) {

  const circ=283,off=circ-(circ*pct)/100;

  const [faqOpen, setFaqOpen] = useState(false);
  const [ticketType, setTicketType] = useState("bug");
  const [ticketText, setTicketText] = useState("");
  const [ticketSent, setTicketSent] = useState(false);
  const [tickets, setTickets] = useState([]);
  useEffect(() => { (async () => { try { const t = await storageGet("puffco-tickets", []); setTickets(t); } catch {} })(); }, []);
  return (
    <div>
      <div className="fu fu1" style={{padding:"22px 0 18px"}}><h2 style={{fontSize:20,fontWeight:600}}>Peak Care</h2></div>

          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:34,fontWeight:200,fontFamily:"'JetBrains Mono',monospace"}}>{profile.dabsSinceClean||0}</span><span style={{fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>Sessions</span></div>
        </div>
        <h3 style={{fontSize:16,fontWeight:500,marginBottom:6}}>{pct>=100?"Time for an ISO Soak":"Chamber is Healthy"}</h3>
        <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",lineHeight:1.5,maxWidth:240,margin:"0 auto 18px"}}>{pct>=100?"Drop your chamber in 99% ISO.":`~${threshold-(profile.dabsSinceClean||0)} sessions until cleaning.`}</p>
        <Btn accent={pct>=100?"white":null} secondary={pct<100} onClick={onClean}>{pct>=100?"Log ISO Soak":"Cleaned it Early"}</Btn>
        {/* Threshold slider */}
        <div style={{marginTop:16,display:"flex",alignItems:"center",gap:10}}>
          <ML style={{marginBottom:0,whiteSpace:"nowrap"}}>Clean at</ML>
          <input type="range" min={10} max={60} value={threshold} onChange={e=>setProfile(p=>({...p,cleanThreshold:Number(e.target.value)}))} style={{flex:1,accentColor:accent}} />
          <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",minWidth:30,textAlign:"right"}}>{threshold}</span>
        </div>
      </Glass>

      {/* Cleaning Guide */}
      <Glass style={{marginBottom:14}}>
        <ML>Cleaning Guide</ML>
            <div style={{fontSize:10,color:accent,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,marginBottom:12}}>Chamber Soak</div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {[
                {step:"1",title:"Remove the Chamber",desc:"Let your Peak cool completely. Gently pull the atomizer chamber straight up and out of the base."},
                {step:"2",title:"Prepare ISO Bath",desc:"Pour enough 99% isopropyl alcohol into a small glass or container to fully submerge the chamber. Do NOT use less than 91%."},
                {step:"3",title:"Soak 20–30 Minutes",desc:"Drop the chamber into the ISO. Let it sit — don't rush this. For heavy buildup, soak up to an hour."},
                {step:"4",title:"Agitate Gently",desc:"After soaking, swirl the chamber around in the ISO to loosen any remaining residue. Use a cotton swab on stubborn spots."},
                {step:"5",title:"Rinse & Dry",desc:"Remove the chamber and rinse with warm water. Set it on a clean paper towel and let it air dry completely — at least 10 minutes."},
                {step:"6",title:"Clean the Base Connection",desc:"While the chamber dries, use an ISO-dipped cotton swab to clean the connection pins inside the base where the atomizer sits."},
                {step:"7",title:"Reassemble",desc:"Once everything is bone dry, drop the chamber back in. Run an empty heat cycle on Blue to burn off any residual moisture."},
              ].map(s => (
                <div key={s.step} style={{display:"flex",gap:12,alignItems:"flex-start"}}>

                  <div><div style={{fontSize:12,fontWeight:500,marginBottom:2}}>{s.title}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.35)",lineHeight:1.5}}>{s.desc}</div></div>

              ))}
            </div>
      </Glass>

      {(profile.cleanHistory||[]).length>0&&<div><ML>Clean History</ML>{(profile.cleanHistory||[]).slice(0,5).map((e,i)=><Glass key={i} style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#4ade80",fontSize:14}}>✓</span><span style={{fontSize:12,fontWeight:500}}>ISO Soak</span></div><div style={{textAlign:"right"}}><div style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontFamily:"'JetBrains Mono',monospace"}}>{e.date}</div></div></Glass>)}</div>}

      {/* ─── HELP ─── */}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
          <ML style={{marginBottom:0}}>How to Use</ML>
          <span style={{color:"rgba(255,255,255,0.3)",fontSize:12}}>{helpOpen?"▾":"▸"}</span>
        </div>
        {helpOpen&&(<div style={{marginTop:14,display:"flex",flexDirection:"column",gap:12}}>
          {[
            {step:"1",title:"Start a Session",desc:"Tap the fire button in the nav bar. Enter your strain, brand, and extract type."},

      </Glass>

      {/* ─── FAQ ─── */}
      <Glass style={{marginBottom:14}} onClick={()=>setFaqOpen(!faqOpen)}>

              {[{id:"bug",label:"🐛"},{id:"idea",label:"💡"},{id:"other",label:"💬"}].map(t=>(
                <button key={t.id} onClick={()=>setTicketType(t.id)} style={{flex:1,padding:"8px 0",borderRadius:10,fontSize:14,cursor:"pointer",WebkitTapHighlightColor:"transparent",background:ticketType===t.id?`${accent}15`:"rgba(255,255,255,0.03)",border:`1px solid ${ticketType===t.id?accent+"40":"rgba(255,255,255,0.06)"}`,color:ticketType===t.id?accent:"rgba(255,255,255,0.35)"}}>{t.label}</button>
              ))}
            </div>
          </div>
          <div>
            <ML>Description</ML>
            <Input rows={3} value={ticketText} onChange={e=>setTicketText(e.target.value)} placeholder="Describe the bug, idea, or feedback..." />
          </div>
          <Btn accent={accent} onClick={async()=>{
            if(!ticketText.trim())return;
            const ticket={id:Date.now(),type:ticketType,text:ticketText.trim(),date:new Date().toISOString().split("T")[0],status:"open"};
            const updated=[ticket,...tickets];setTickets(updated);await storageSet("puffco-tickets",updated);
            setTicketText("");setTicketSent(true);setTimeout(()=>setTicketSent(false),3000);haptic.success();
          }}>Submit</Btn>
        </div>
      </Glass>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// PROFILE TAB (#9 stats summary, #18 custom profiles)
// ═══════════════════════════════════════════════════════
function ProfileTab({profile,setProfile,accent,stash,lvl,xp,streak,unlocked,profileStats,heatProfiles,setHeatProfiles,activeProfileId,setActiveProfileId,editingProfile,setEditingProfile,accessories,setAccessories,customRatingDims,setCustomRatingDims}) {
  const [previewFrame, setPreviewFrame] = useState(null);
  const accent2 = profile.accent2 || null;
  const accentGrad = accent2 ? `linear-gradient(135deg, ${accent}, ${accent2})` : accent;
  const [profileSub, setProfileSub] = useState("profile"); // profile, devices, appearance, achievements, settings
  const avatarRef = useRef(null);
  const handleAvatarUpload = async (e) => { const file = e.target.files[0]; if (!file) return; const dataUrl = await compressPhoto(file, 256); setProfile(p => ({ ...p, avatar: dataUrl })); };

  const subTabs = [
    {id:"profile",label:"Profile"},
    {id:"devices",label:"Devices"},
    {id:"appearance",label:"Theme"},
    {id:"achievements",label:"Awards"},
    {id:"settings",label:"Settings"},
  ];

  return (
    <div>
      <div style={{padding:"22px 0 14px"}}><h2 style={{fontSize:20,fontWeight:600}}>Profile</h2></div>

      {/* Sub-navigation */}
      <div style={{display:"flex",gap:4,marginBottom:16,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>

          <button key={t.id} onClick={()=>{haptic.nav();setProfileSub(t.id)}} style={{
            padding:"7px 14px",borderRadius:12,fontSize:8,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer",
            fontFamily:"'JetBrains Mono',monospace",fontWeight:600,flexShrink:0,WebkitTapHighlightColor:"transparent",
            background:profileSub===t.id?accent:"rgba(255,255,255,0.03)",
            color:profileSub===t.id?"#000":"rgba(255,255,255,0.3)",
            border:`1px solid ${profileSub===t.id?accent:"rgba(255,255,255,0.06)"}`,
          }}>{t.label}</button>
        ))}
      </div>

      {/* ═══ PROFILE SUB-TAB ═══ */}
      {profileSub==="profile"&&<>
        {/* Avatar */}
        <input ref={avatarRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleAvatarUpload} />
        <Glass style={{textAlign:"center",marginBottom:14}}>
          <div style={{position:"relative",width:72,height:72,margin:"0 auto 12px"}}>
            <PfpFrame frameId={profile.frame || "none"} size={72} accent={accent} accentGrad={accentGrad} />
            <div onClick={() => avatarRef.current?.click()} style={{width:72,height:72,borderRadius:"50%",background:`${accent}20`,border:`2px solid ${accent}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:600,cursor:"pointer",overflow:"hidden"}}>
              {profile.avatar ? <img src={profile.avatar} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} /> : <span>{profile.name ? profile.name[0].toUpperCase() : "?"}</span>}
            </div>
            {profile.avatar && (
              <button onClick={(e) => {e.stopPropagation(); setProfile(p => ({...p, avatar:""}))}} style={{position:"absolute",top:-2,right:-2,width:20,height:20,borderRadius:"50%",background:"rgba(239,68,68,0.9)",border:"2px solid #04040c",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:10,color:"white",lineHeight:1}}>✕</button>
            )}
          </div>
          <div style={{fontSize:18,fontWeight:500,marginBottom:4}}>{profile.name||"Set Your Name"}</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase"}}>{profile.device} · {stash.length} sessions</div>
          {profile.location&&<div style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>📍 {profile.location} · {profile.market==="black"?"BM":profile.market==="med"?"Med":"Rec"}</div>}
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:8}}><span style={{fontSize:14}}>{lvl.emoji}</span><span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:accent,letterSpacing:1.5}}>Lv.{lvl.level} {lvl.title}</span></div>
          {profile.bio&&<div style={{fontSize:11,color:"rgba(255,255,255,0.35)",fontStyle:"italic",marginTop:8,lineHeight:1.5,maxWidth:280,margin:"8px auto 0"}}>"{profile.bio}"</div>}
          <p style={{fontSize:9,color:"rgba(255,255,255,0.15)",marginTop:8,fontFamily:"'JetBrains Mono',monospace"}}>Tap photo to change</p>
        </Glass>

        {/* About You */}
        <Glass style={{marginBottom:14}}>
          <ML>About You</ML>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div><ML>Name</ML><Input value={profile.name||""} onChange={e=>setProfile(p=>({...p,name:e.target.value}))} placeholder="Your name" /></div>
            <div><ML>Device</ML>
              <select value={profile.device||"Peak"} onChange={e=>setProfile(p=>({...p,device:e.target.value}))} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"10px 14px",fontSize:13,color:"white",outline:"none",appearance:"none",fontFamily:"'Syne',sans-serif"}}>
                {["Peak","Peak Pro","Pivot","Proxy","Other"].map(d=><option key={d} value={d} style={{background:"#111"}}>{d}</option>)}
              </select>
            </div>
          </div>
          <div style={{marginBottom:12}}><ML>Bio</ML><Input rows={2} value={profile.bio||""} onChange={e=>setProfile(p=>({...p,bio:e.target.value.slice(0,200)}))} placeholder="Tell the community about yourself..." style={{fontSize:12}} /><div style={{textAlign:"right",fontSize:7,color:"rgba(255,255,255,0.15)",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{(profile.bio||"").length}/200</div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div><ML>Location</ML><Input value={profile.location||""} onChange={e=>setProfile(p=>({...p,location:e.target.value}))} placeholder="e.g. Portland, OR" /></div>
            <div><ML>Market</ML><div style={{display:"flex",gap:6}}>{[{id:"rec",label:"Rec"},{id:"med",label:"Med"},{id:"black",label:"BM"}].map(m=>(<button key={m.id} onClick={()=>setProfile(p=>({...p,market:m.id}))} style={{flex:1,padding:"10px 0",borderRadius:10,fontSize:9,letterSpacing:1,textTransform:"uppercase",fontWeight:600,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",WebkitTapHighlightColor:"transparent",background:(profile.market||"rec")===m.id?`${accent}15`:"rgba(255,255,255,0.03)",border:`1px solid ${(profile.market||"rec")===m.id?accent+"40":"rgba(255,255,255,0.06)"}`,color:(profile.market||"rec")===m.id?accent:"rgba(255,255,255,0.35)"}}>{m.label}</button>))}</div></div>
          </div>
        </Glass>

        {/* At a Glance */}
        {profileStats&&<Glass style={{marginBottom:14}}>
          <ML>At a Glance</ML>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
            {[{l:"Avg",v:profileStats.avgRating!=="—"?profileStats.avgRating+"★":"—"},{l:"Brands",v:profileStats.brands},{l:"Strains",v:profileStats.strains}].map((s,i)=><div key={i} style={{textAlign:"center"}}><div style={{fontSize:18,fontFamily:"'JetBrains Mono',monospace",fontWeight:300}}>{s.v}</div><div style={{fontSize:7,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{s.l}</div></div>)}
          </div>
          <div style={{display:"flex",gap:10}}>
            {profileStats.favZone&&<div style={{flex:1,padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:7,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>Fav Temp</div><div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:7,height:7,borderRadius:"50%",background:HEAT_ZONES.find(z=>z.name===profileStats.favZone)?.hex}}/><span style={{fontSize:12,fontWeight:600}}>{profileStats.favZone}</span></div></div>}
            {profileStats.topStrain&&<div style={{flex:1,padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:7,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>Top Strain</div><div style={{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profileStats.topStrain}</div><div style={{fontSize:8,color:"rgba(255,255,255,0.25)",marginTop:2}}>{profileStats.topStrainCount}×</div></div>}
          </div>
        </Glass>}

        {/* Export/Import */}
        <Glass style={{marginBottom:14}}><ML>Data</ML><div style={{display:"flex",gap:8}}><Btn secondary style={{flex:1}} onClick={()=>{const d=JSON.stringify({stash,profile,heatProfiles,version:APP_VERSION});const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="puffco-backup.json";a.click();URL.revokeObjectURL(u)}}>Export</Btn><Btn secondary style={{flex:1}} onClick={()=>{const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.stash){await storageSet("puffco-stash",d.stash);setStash(d.stash)}if(d.profile){await storageSet("puffco-profile",d.profile);setProfile(d.profile)}if(d.heatProfiles){await storageSet("puffco-heat-profiles",d.heatProfiles);setHeatProfiles(d.heatProfiles)}}catch{alert("Invalid backup")}};i.click()}}>Import</Btn></div></Glass>
      </>}

      {/* ═══ DEVICES SUB-TAB ═══ */}
      {profileSub==="devices"&&<>
        <Glass style={{marginBottom:14}}><ML>Device</ML><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{["Peak","Peak Pro","Pivot","Proxy","Other"].map(d=><button key={d} onClick={()=>setProfile(p=>({...p,device:d}))} style={{padding:10,borderRadius:10,fontSize:10,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,background:profile.device===d?accent:"rgba(255,255,255,0.03)",color:profile.device===d?"#000":"rgba(255,255,255,0.4)",border:`1px solid ${profile.device===d?accent:"rgba(255,255,255,0.06)"}`}}>{d}</button>)}</div></Glass>

        <Glass style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <ML style={{marginBottom:0}}>Heat Profiles</ML>
            <button onClick={()=>setEditingProfile({isNew:true,name:"",tempF:510,time:30,color:"#6C5CE7"})} style={{background:"none",border:`1px solid ${accent}40`,borderRadius:8,padding:"4px 12px",fontSize:8,color:accent,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",fontWeight:600}}>+ New</button>
          </div>
          {heatProfiles.map(p=>{const active=p.id===activeProfileId;const z=getZone(p.tempF);return(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:p.color||z.hex,boxShadow:active?`0 0 8px ${p.color||z.hex}50`:"none"}}/>
              <div style={{flex:1}}><div style={{fontSize:12,fontWeight:active?600:400}}>{p.name}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{p.tempF}°F · {p.time}s</div></div>
              <button onClick={()=>{setActiveProfileId(p.id);storageSet("puffco-active-profile",p.id);haptic.tap()}} style={{padding:"4px 10px",borderRadius:8,fontSize:8,letterSpacing:1,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",background:active?`${accent}15`:"transparent",border:`1px solid ${active?accent+"40":"rgba(255,255,255,0.06)"}`,color:active?accent:"rgba(255,255,255,0.3)"}}>{active?"Active":"Set"}</button>
              {!p.isDefault&&<button onClick={e=>{e.stopPropagation();setEditingProfile({...p})}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:12}}>✎</button>}
            </div>
          )})}
        </Glass>

        {editingProfile&&<Glass style={{marginBottom:14}}>
          <ML>{editingProfile.isNew?"New Profile":"Edit Profile"}</ML>
          <div style={{marginBottom:14}}><ML>Name</ML><Input value={editingProfile.name} onChange={e=>setEditingProfile(p=>({...p,name:e.target.value}))} placeholder="Profile name..."/></div>
          <div style={{display:"flex",gap:12,marginBottom:14}}>
            <div style={{flex:1}}><ML>Temp °F</ML><input type="number" min={400} max={620} value={editingProfile.tempF} onChange={e=>setEditingProfile(p=>({...p,tempF:Number(e.target.value)}))} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"10px 14px",fontSize:13,color:"white",outline:"none"}}/></div>
            <div style={{flex:1}}><ML>Time (s)</ML><input type="number" min={10} max={300} value={editingProfile.time} onChange={e=>setEditingProfile(p=>({...p,time:Number(e.target.value)}))} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"10px 14px",fontSize:13,color:"white",outline:"none"}}/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn accent={accent} onClick={()=>{if(!editingProfile.name.trim())return;if(editingProfile.isNew){const np={...editingProfile,id:Date.now(),isNew:undefined};const u=[...heatProfiles,np];setHeatProfiles(u);storageSet("puffco-heat-profiles",u)}else{const u=heatProfiles.map(p=>p.id===editingProfile.id?editingProfile:p);setHeatProfiles(u);storageSet("puffco-heat-profiles",u)}setEditingProfile(null);haptic.success()}} style={{flex:1}}>Save</Btn>
            <Btn secondary onClick={()=>setEditingProfile(null)} style={{flex:1}}>Cancel</Btn>
          </div>
          {!editingProfile.isNew&&!editingProfile.isDefault&&<Btn secondary onClick={()=>{const u=heatProfiles.filter(p=>p.id!==editingProfile.id);setHeatProfiles(u);storageSet("puffco-heat-profiles",u);setEditingProfile(null)}} style={{marginTop:8,color:"#ef4444"}}>Delete Profile</Btn>}
        </Glass>}
      </>}

      {/* ═══ APPEARANCE SUB-TAB ═══ */}
      {profileSub==="appearance"&&<>
        <Glass style={{marginBottom:14}}>
          <ML>Theme</ML>
          <ML style={{fontSize:7,color:"rgba(255,255,255,0.2)"}}>Solids</ML>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
            {COLORWAYS.filter(c=>c.section==="solid").map(c=><button key={c.name} onClick={()=>{setProfile(p=>({...p,accent:c.hex,accent2:null}));haptic.tap()}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:8,borderRadius:10,cursor:"pointer",background:accent===c.hex&&!accent2?"rgba(255,255,255,0.06)":"transparent",border:`1px solid ${accent===c.hex&&!accent2?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.04)"}`,WebkitTapHighlightColor:"transparent"}}><div style={{width:22,height:22,borderRadius:"50%",background:c.hex,boxShadow:`0 0 8px ${c.hex}30`}}/><span style={{fontSize:6,color:"rgba(255,255,255,0.3)",letterSpacing:1,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{c.name}</span></button>)}
          </div>
          <ML style={{fontSize:7,color:"rgba(255,255,255,0.2)"}}>Ombré</ML>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
            {COLORWAYS.filter(c=>c.section==="ombre").map(c=><button key={c.name} onClick={()=>{setProfile(p=>({...p,accent:c.hex,accent2:c.hex2}));haptic.tap()}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:8,borderRadius:10,cursor:"pointer",background:accent===c.hex&&accent2===c.hex2?"rgba(255,255,255,0.06)":"transparent",border:`1px solid ${accent===c.hex&&accent2===c.hex2?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.04)"}`,WebkitTapHighlightColor:"transparent"}}><div style={{width:22,height:22,borderRadius:"50%",background:`linear-gradient(135deg,${c.hex},${c.hex2})`,boxShadow:`0 0 8px ${c.hex}30`}}/><span style={{fontSize:6,color:"rgba(255,255,255,0.3)",letterSpacing:1,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{c.name}</span></button>)}
          </div>
          <ML style={{fontSize:7,color:"rgba(255,255,255,0.2)"}}>Special</ML>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {COLORWAYS.filter(c=>c.section==="special").map(c=><button key={c.name} onClick={()=>{setProfile(p=>({...p,accent:c.hex,accent2:c.hex2||null}));haptic.tap()}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:8,borderRadius:10,cursor:"pointer",background:accent===c.hex?"rgba(255,255,255,0.06)":"transparent",border:`1px solid ${accent===c.hex?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.04)"}`,WebkitTapHighlightColor:"transparent"}}><div style={{width:22,height:22,borderRadius:"50%",background:c.hex2?`linear-gradient(135deg,${c.hex},${c.hex2})`:c.hex,boxShadow:`0 0 8px ${c.hex}30`}}/><span style={{fontSize:6,color:"rgba(255,255,255,0.3)",letterSpacing:1,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{c.name}</span></button>)}
          </div>
        </Glass>

        <Glass style={{marginBottom:14}}>
          <ML>Profile Frame</ML>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {LEVELS.map(l=>{const locked=xp<l.xp;return(
              <button key={l.frame} onClick={()=>{if(!locked){setProfile(p=>({...p,frame:l.frame}));haptic.tap()}else{setPreviewFrame(l)}}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:8,borderRadius:10,cursor:"pointer",opacity:locked?0.35:1,background:profile.frame===l.frame?"rgba(255,255,255,0.06)":"transparent",border:`1px solid ${profile.frame===l.frame?accent+"40":"rgba(255,255,255,0.04)"}`,WebkitTapHighlightColor:"transparent"}}>
                <div style={{position:"relative",width:32,height:32}}><PfpFrame frameId={l.frame} size={32} accent={accent} accentGrad={accentGrad}/></div>
                <span style={{fontSize:6,color:"rgba(255,255,255,0.3)",letterSpacing:1,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>Lv.{l.level}</span>
              </button>
            )})}
          </div>
        </Glass>

        {previewFrame&&<div style={{position:"fixed",inset:0,zIndex:72,background:"rgba(4,4,12,0.96)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",padding:24}} onClick={()=>setPreviewFrame(null)}>
          <button onClick={()=>setPreviewFrame(null)} style={{position:"fixed",top:"max(16px, env(safe-area-inset-top, 16px))",right:16,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"50%",width:42,height:42,color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",zIndex:75,WebkitTapHighlightColor:"transparent","aria-label":"Close"}}>✕</button>
          <div style={{position:"relative",width:120,height:120,marginBottom:20}}>
            <PfpFrame frameId={previewFrame.frame} size={120} accent={accent} accentGrad={accentGrad}/>
            <div style={{width:120,height:120,borderRadius:"50%",background:`${accent}20`,border:`2px solid ${accent}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,overflow:"hidden"}}>{profile.avatar?<img src={profile.avatar} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{color:accent}}>{(profile.name||"?")[0].toUpperCase()}</span>}</div>
          </div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>{previewFrame.title}</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",marginBottom:16}}>Level {previewFrame.level} · {previewFrame.xp.toLocaleString()} XP</div>
          {xp>=previewFrame.xp?<Btn accent={accent} onClick={(e)=>{e.stopPropagation();setProfile(p=>({...p,frame:previewFrame.frame}));setPreviewFrame(null);haptic.success()}} style={{maxWidth:200}}>Equip Frame</Btn>:<Btn disabled style={{maxWidth:200}}>🔒 Locked</Btn>}
        </div>}
      </>}

      {/* ═══ ACHIEVEMENTS SUB-TAB ═══ */}
      {profileSub==="achievements"&&<>
        <Glass style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <ML style={{marginBottom:0}}>Achievements</ML>
            <span style={{fontSize:10,color:accent,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{unlocked.length}/{ACHIEVEMENTS.length}</span>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {ACHIEVEMENTS.map(a=><AchievementBadge key={a.id} achievement={a} earned={a.check(stash)} accent={accent} />)}
          </div>
        </Glass>
        {/* XP Progress */}
        <Glass style={{marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
            <div style={{width:46,height:46,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:`${accent}18`,border:`1.5px solid ${accent}50`}}>{lvl.emoji}</div>
            <div style={{flex:1}}><div style={{display:"flex",alignItems:"baseline",gap:8}}><span style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:accent}}>Level {lvl.level}</span><span style={{fontSize:16,fontWeight:500}}>{lvl.title}</span></div><div style={{fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{xp.toLocaleString()} XP</div></div>

        </Glass>
      </>}

      {/* ═══ SETTINGS SUB-TAB ═══ */}
      {profileSub==="settings"&&<>
        {/* Custom Rating Dimensions */}
        <Glass style={{marginBottom:14}}>
          <ML>Custom Rating Dimensions</ML>
          <p style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginBottom:10,lineHeight:1.4}}>Toggle extra rating categories that appear during session rating.</p>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {customRatingDims.map(d=>(
              <button key={d.id} onClick={()=>{const updated=customRatingDims.map(x=>x.id===d.id?{...x,enabled:!x.enabled}:x);setCustomRatingDims(updated);storageSet("puffco-custom-ratings",updated);haptic.tap()}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:12,cursor:"pointer",WebkitTapHighlightColor:"transparent",background:d.enabled?`${accent}10`:"rgba(255,255,255,0.02)",border:`1px solid ${d.enabled?accent+"30":"rgba(255,255,255,0.06)"}`}}>
                <span style={{fontSize:12,color:d.enabled?"white":"rgba(255,255,255,0.35)"}}>{d.label}</span>
                <div style={{width:36,height:20,borderRadius:10,background:d.enabled?accent:"rgba(255,255,255,0.1)",transition:"background 0.2s",position:"relative"}}><div style={{width:16,height:16,borderRadius:"50%",background:"white",position:"absolute",top:2,left:d.enabled?18:2,transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}/></div>
              </button>
            ))}
          </div>
        </Glass>

        {/* Accessories */}
        <Glass style={{marginBottom:14}}>
          <ML>Accessories</ML>
          {accessories.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
            {accessories.map((a,i)=>(
              <div key={a.id||i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:12,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
                {a.photo&&<div style={{width:36,height:36,borderRadius:8,overflow:"hidden",flexShrink:0}}><img src={a.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:500}}>{a.name}</div><div style={{fontSize:8,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{a.type}{a.brand?" · "+a.brand:""}</div></div>
                <button onClick={()=>{const updated=accessories.filter((_,j)=>j!==i);setAccessories(updated);storageSet("puffco-accessories",updated)}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.15)",cursor:"pointer",fontSize:12}}>✕</button>
              </div>
            ))}
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <Input value={profile._accName||""} onChange={e=>setProfile(p=>({...p,_accName:e.target.value}))} placeholder="Name" />
            <select value={profile._accType||"Glass"} onChange={e=>setProfile(p=>({...p,_accType:e.target.value}))} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"10px 14px",fontSize:13,color:"white",outline:"none",appearance:"none",fontFamily:"'Syne',sans-serif"}}>
              {["Glass","Cap","Tether","Chamber","Atomizer","Ball Cap","Oculus","Travel Pack","Other"].map(t=><option key={t} value={t} style={{background:"#111"}}>{t}</option>)}
            </select>
          </div>
          <Input value={profile._accBrand||""} onChange={e=>setProfile(p=>({...p,_accBrand:e.target.value}))} placeholder="Brand (optional)" style={{marginBottom:8}} />
          <Btn secondary small onClick={()=>{if(!(profile._accName||"").trim())return;const acc={id:Date.now(),name:profile._accName.trim(),type:profile._accType||"Glass",brand:profile._accBrand||""};const updated=[...accessories,acc];setAccessories(updated);storageSet("puffco-accessories",updated);setProfile(p=>({...p,_accName:"",_accBrand:""}));haptic.success()}}>+ Add Accessory</Btn>
        </Glass>

        {/* Storage Warning */}
        {typeof localStorage!=="undefined"&&getStorageUsage()>STORAGE_WARN_BYTES&&(
          <Glass style={{marginBottom:14,border:"1px solid rgba(250,204,21,0.2)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>⚠️</span>
              <div><div style={{fontSize:11,fontWeight:600,color:"#facc15"}}>Storage Almost Full</div><div style={{fontSize:10,color:"rgba(255,255,255,0.35)",lineHeight:1.4,marginTop:2}}>You're using {(getStorageUsage()/1000000).toFixed(1)}MB. Export a backup and consider removing old photos.</div></div>
            </div>
          </Glass>
        )}
      </>}

      {/* Changelog Modal */}
      {/* (Changelog is triggered from the header, not from profile sub-nav) */}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// FEATURE #11: STRAIN ENCYCLOPEDIA
// ═══════════════════════════════════════════════════════
function EncyclopediaTab({strainMap,accent,strainView,setStrainView,onSelect,setTab,stash}) {
  const [encSearch, setEncSearch] = useState("");
  const [encSort, setEncSort] = useState("count");
  const [folders, setFolders] = useState([]);
  const [activeFolder, setActiveFolder] = useState(null);
  const [newFolderName, setNewFolderName] = useState("");
  const [showNewFolder, setShowNewFolder] = useState(false);

  useEffect(() => { (async () => { try { const f = await storageGet("puffco-folders", []); setFolders(f); } catch {} })(); }, []);
  const saveFolders = async (f) => { setFolders(f); await storageSet("puffco-folders", f); };
  const createFolder = () => { if (!newFolderName.trim()) return; saveFolders([...folders, { id: Date.now(), name: newFolderName.trim(), strains: [] }]); setNewFolderName(""); setShowNewFolder(false); };
  const deleteFolder = (id) => { saveFolders(folders.filter(f => f.id !== id)); if (activeFolder === id) setActiveFolder(null); };
  const toggleStrainInFolder = (folderId, strainKey) => { saveFolders(folders.map(f => f.id === folderId ? { ...f, strains: f.strains.includes(strainKey) ? f.strains.filter(s => s !== strainKey) : [...f.strains, strainKey] } : f)); };

  const allEntries = Object.entries(strainMap);
  let entries = allEntries;
  if (activeFolder) { const folder = folders.find(f => f.id === activeFolder); if (folder) entries = entries.filter(([key]) => folder.strains.includes(key)); }
  if (encSearch.trim()) { const q = encSearch.toLowerCase(); entries = entries.filter(([,d]) => d.strain.toLowerCase().includes(q) || d.brand.toLowerCase().includes(q) || [...d.types].some(t => t.toLowerCase().includes(q))); }
  if (encSort === "count") entries = entries.sort((a,b) => b[1].sessions.length - a[1].sessions.length);
  else if (encSort === "rating") entries = entries.sort((a,b) => { const ar = b[1].sessions.reduce((s,x) => s+(x.rating||0), 0) / (b[1].sessions.filter(x=>x.rating>0).length||1); const br = a[1].sessions.reduce((s,x) => s+(x.rating||0), 0) / (a[1].sessions.filter(x=>x.rating>0).length||1); return ar - br; });
  else entries = entries.sort((a,b) => a[1].strain.localeCompare(b[1].strain));

  return (
    <div>
      <div className="fu fu1" style={{padding:"22px 0 18px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div><h2 style={{fontSize:20,fontWeight:600}}>Strain Encyclopedia</h2><p style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:5,fontFamily:"'JetBrains Mono',monospace"}}>{allEntries.length} unique strain{allEntries.length!==1?"s":""}</p></div>
        <button onClick={()=>setTab("stash")} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:9,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",cursor:"pointer"}}>← Back</button>
      </div>
      {/* Folders */}
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
        <button onClick={()=>setActiveFolder(null)} style={{padding:"6px 14px",borderRadius:16,fontSize:8,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,flexShrink:0,WebkitTapHighlightColor:"transparent",background:!activeFolder?accent:"transparent",color:!activeFolder?"#000":"rgba(255,255,255,0.3)",border:`1px solid ${!activeFolder?accent:accent+"30"}`}}>All</button>
        {folders.map(f=>(<button key={f.id} onClick={()=>setActiveFolder(activeFolder===f.id?null:f.id)} style={{padding:"6px 14px",borderRadius:16,fontSize:8,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,flexShrink:0,WebkitTapHighlightColor:"transparent",display:"flex",alignItems:"center",gap:4,background:activeFolder===f.id?accent:"transparent",color:activeFolder===f.id?"#000":"rgba(255,255,255,0.3)",border:`1px solid ${activeFolder===f.id?accent:accent+"30"}`}}>{f.name} <span style={{opacity:0.6}}>({f.strains.length})</span></button>))}
        <button onClick={()=>setShowNewFolder(true)} style={{padding:"6px 14px",borderRadius:16,fontSize:8,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",flexShrink:0,WebkitTapHighlightColor:"transparent",background:"transparent",color:"rgba(255,255,255,0.2)",border:"1px dashed rgba(255,255,255,0.1)"}}>+ Folder</button>
      </div>
      {showNewFolder&&(<Glass style={{marginBottom:12,display:"flex",gap:8,alignItems:"center"}}><Input value={newFolderName} onChange={e=>setNewFolderName(e.target.value)} placeholder="Folder name..." style={{flex:1}} /><button onClick={createFolder} style={{padding:"8px 16px",borderRadius:10,background:accent,border:"none",color:"#000",fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",letterSpacing:1,WebkitTapHighlightColor:"transparent"}}>Add</button><button onClick={()=>{setShowNewFolder(false);setNewFolderName("")}} style={{padding:"8px 10px",borderRadius:10,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.4)",fontSize:9,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>✕</button></Glass>)}
      {activeFolder&&(()=>{const f=folders.find(x=>x.id===activeFolder);return f?(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}>{f.name}</span><button onClick={()=>deleteFolder(f.id)} style={{background:"none",border:"none",color:"rgba(239,68,68,0.5)",fontSize:8,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",letterSpacing:1,textTransform:"uppercase",WebkitTapHighlightColor:"transparent"}}>Delete Folder</button></div>):null})()}
      {/* Search */}
      <div style={{position:"relative",marginBottom:10}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"rgba(255,255,255,0.2)"}}>⌕</span>
        <Input value={encSearch} onChange={e=>setEncSearch(e.target.value)} placeholder="Search strain, brand, or type..." style={{paddingLeft:34}} />
        {encSearch&&<button onClick={()=>setEncSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:14}}>✕</button>}
      </div>
      {/* Sort */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[{id:"count",label:"Most Dabbed"},{id:"rating",label:"Top Rated"},{id:"alpha",label:"A → Z"}].map(s=>(<button key={s.id} onClick={()=>setEncSort(s.id)} style={{padding:"5px 12px",borderRadius:16,fontSize:8,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,WebkitTapHighlightColor:"transparent",background:encSort===s.id?accent:"transparent",color:encSort===s.id?"#000":"rgba(255,255,255,0.3)",border:`1px solid ${encSort===s.id?accent:accent+"30"}`}}>{s.label}</button>))}
      </div>
      {entries.length===0?<div style={{textAlign:"center",padding:"60px 0"}}><p style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}>{encSearch?"No results":activeFolder?"No strains in this folder":"Log sessions to build your encyclopedia"}</p></div>
      :<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {entries.map(([key,data])=>{
          const avgR=data.sessions.filter(s=>s.rating>0).length?(data.sessions.reduce((a,s)=>a+(s.rating||0),0)/data.sessions.filter(s=>s.rating>0).length).toFixed(1):"—";
          const bestTemp=data.sessions.filter(s=>s.finalTempF).sort((a,b)=>(b.rating||0)-(a.rating||0))[0];
          const z=bestTemp?getZone(bestTemp.finalTempF):null;
          const photo=data.sessions.find(s=>s.photo)?.photo;
          return (
            <Glass key={key} style={{padding:0,overflow:"hidden"}}>
              <div onClick={()=>setStrainView(key)} style={{display:"flex",cursor:"pointer"}}>
              {photo&&<div style={{width:60,height:60,flexShrink:0,overflow:"hidden"}}><img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
              <div style={{flex:1,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:1.5,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{data.brand}</div>
                  <div style={{fontSize:13,fontWeight:500,marginTop:2}}>{data.strain}</div>
                  <div style={{fontSize:8,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{data.sessions.length} session{data.sessions.length!==1?"s":""}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:16,fontFamily:"'JetBrains Mono',monospace",fontWeight:300}}>{avgR}{avgR!=="—"&&"★"}</div>
                  {z&&<div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:z.hex}}/><span style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"'JetBrains Mono',monospace"}}>{bestTemp.finalTempF}°</span></div>}
                </div>
              </div>
              </div>
              {folders.length>0&&(<div style={{display:"flex",gap:4,padding:"0 10px 8px",flexWrap:"wrap"}}>{folders.map(f=>{const inF=f.strains.includes(key);return <button key={f.id} onClick={(e)=>{e.stopPropagation();toggleStrainInFolder(f.id,key)}} style={{fontSize:7,padding:"3px 8px",borderRadius:8,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",WebkitTapHighlightColor:"transparent",background:inF?`${accent}15`:"transparent",border:`1px solid ${inF?accent+"30":"rgba(255,255,255,0.06)"}`,color:inF?accent:"rgba(255,255,255,0.2)"}}>{inF?"• ":""}{f.name}</button>})}</div>)}
            </Glass>
          );
        })}
      </div>}
    </div>
  );
}

// Strain Detail Modal
// ─── Strain Trading Card ──────────────────────────────
function StrainTradingCard({data,accent,onClose}) {
  const sessions = data.sessions;
  const avgR=sessions.filter(s=>s.rating>0).length?(sessions.reduce((a,s)=>a+(s.rating||0),0)/sessions.filter(s=>s.rating>0).length).toFixed(1):"—";
  const photo=sessions.find(s=>s.photo)?.photo;
  const topEffect = (()=>{const ec={};sessions.flatMap(s=>s.effects||[]).forEach(e=>{ec[e]=(ec[e]||0)+1});const top=Object.entries(ec).sort((a,b)=>b[1]-a[1])[0];return top?EFFECTS_LIST.find(x=>x.id===top[0]):null})();
  const bestTemp = sessions.filter(s=>s.finalTempF).sort((a,b)=>(b.rating||0)-(a.rating||0))[0];
  // Generate a unique hash for the holographic pattern
  const hash = (data.brand+data.strain).split("").reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0)|0,0);
  const hue1 = Math.abs(hash%360);
  const hue2 = (hue1+120)%360;
  const hue3 = (hue1+240)%360;
  const rarity = sessions.length>=20?"Legendary":sessions.length>=10?"Rare":sessions.length>=5?"Uncommon":"Common";
  const rarityColor = {Legendary:"#fbbf24",Rare:"#a78bfa",Uncommon:"#34d399",Common:"rgba(255,255,255,0.4)"}[rarity];
  
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:80,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div onClick={e=>e.stopPropagation()} style={{width:280,borderRadius:20,overflow:"hidden",position:"relative",background:"#0a0a18",border:`1px solid ${accent}40`,boxShadow:`0 0 40px ${accent}20, 0 20px 60px rgba(0,0,0,0.5)`}}>
        {/* Holographic overlay */}
        <div style={{position:"absolute",inset:0,background:`linear-gradient(135deg, hsla(${hue1},70%,60%,0.08) 0%, hsla(${hue2},70%,60%,0.05) 33%, hsla(${hue3},70%,60%,0.08) 66%, hsla(${hue1},70%,60%,0.05) 100%)`,pointerEvents:"none",zIndex:2}}/>
        <div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse at 30% 20%, hsla(${hue1},80%,70%,0.12) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, hsla(${hue2},80%,70%,0.1) 0%, transparent 50%)`,pointerEvents:"none",zIndex:2}}/>
        {/* Shimmer line */}
        <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:3}}>
          <div style={{position:"absolute",top:0,left:"-100%",width:"50%",height:"100%",background:"linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent)",animation:"shimmer 3s ease-in-out infinite"}}/>
        </div>
        
        {/* Card content */}
        <div style={{position:"relative",zIndex:1,padding:20}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div style={{fontSize:7,letterSpacing:3,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>Puffco Companion</div>
            <div style={{fontSize:7,letterSpacing:2,color:rarityColor,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{rarity}</div>
          </div>
          
          {/* Photo or pattern */}
          <div style={{width:"100%",height:140,borderRadius:14,overflow:"hidden",marginBottom:14,background:`linear-gradient(135deg, ${accent}15, rgba(255,255,255,0.02))`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            {photo?<img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:(
              <svg viewBox="0 0 200 140" style={{width:"100%",height:"100%",opacity:0.15}}>
                {Array.from({length:8}).map((_,i)=><circle key={i} cx={30+Math.abs((hash*i*17)%140)} cy={20+Math.abs((hash*i*23)%100)} r={8+Math.abs((hash*i*7)%12)} fill={accent} opacity={0.2+Math.abs((hash*i*3)%5)*0.1}/>)}
                {Array.from({length:4}).map((_,i)=><line key={i} x1={Math.abs((hash*i*31)%200)} y1={Math.abs((hash*i*13)%140)} x2={Math.abs((hash*i*41)%200)} y2={Math.abs((hash*i*19)%140)} stroke={accent} strokeWidth="0.5" opacity="0.3"/>)}
              </svg>
            )}
          </div>
          
          {/* Strain info */}
          <div style={{fontSize:8,letterSpacing:2.5,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{data.brand}</div>
          <div style={{fontSize:20,fontWeight:600,marginTop:2,letterSpacing:-0.3}}>{data.strain}</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{[...data.types].join(" · ")}</div>
          
          {/* Stats grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:14}}>
            <div style={{textAlign:"center",padding:"8px 0",borderRadius:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:16,fontWeight:300,fontFamily:"'JetBrains Mono',monospace"}}>{avgR}</div>
              <div style={{fontSize:6,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>Rating</div>
            </div>
            <div style={{textAlign:"center",padding:"8px 0",borderRadius:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:16,fontWeight:300,fontFamily:"'JetBrains Mono',monospace"}}>{sessions.length}</div>
              <div style={{fontSize:6,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>Sessions</div>
            </div>
            <div style={{textAlign:"center",padding:"8px 0",borderRadius:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:16,fontWeight:300,fontFamily:"'JetBrains Mono',monospace"}}>{bestTemp?bestTemp.finalTempF+"°":"—"}</div>
              <div style={{fontSize:6,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>Best Temp</div>
            </div>
          </div>
          
          {/* Effect + footer */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
            {topEffect&&<span style={{fontSize:8,padding:"3px 8px",borderRadius:8,background:`${accent}12`,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>{topEffect.emoji} {topEffect.label}</span>}
            <span style={{fontSize:7,color:"rgba(255,255,255,0.12)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:1}}>#{Math.abs(hash).toString(16).slice(0,6).toUpperCase()}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function StrainDetailModal({strainKey,strainMap,accent,onClose,onSelect}) {
  const [showCard, setShowCard] = useState(false);
  const data = strainMap[strainKey];
  if (!data) return null;
  const sessions = data.sessions;
  const avgR=sessions.filter(s=>s.rating>0).length?(sessions.reduce((a,s)=>a+(s.rating||0),0)/sessions.filter(s=>s.rating>0).length).toFixed(1):"—";
  const avgV=sessions.filter(s=>s.vapor>0).length?(sessions.reduce((a,s)=>a+(s.vapor||0),0)/sessions.filter(s=>s.vapor>0).length).toFixed(1):"—";
  const avgT=sessions.filter(s=>s.taste>0).length?(sessions.reduce((a,s)=>a+(s.taste||0),0)/sessions.filter(s=>s.taste>0).length).toFixed(1):"—";
  const avgP=sessions.filter(s=>s.potency>0).length?(sessions.reduce((a,s)=>a+(s.potency||0),0)/sessions.filter(s=>s.potency>0).length).toFixed(1):"—";
  const effects=sessions.flatMap(s=>s.effects||[]);
  const effectCounts={};effects.forEach(e=>{effectCounts[e]=(effectCounts[e]||0)+1});
  const topEffects=Object.entries(effectCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const photo=sessions.find(s=>s.photo)?.photo;

  return (
    <div style={{position:"fixed",inset:0,zIndex:70,background:"rgba(4,4,12,0.96)",overflowY:"auto"}} onPointerDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{maxWidth:440,margin:"0 auto",padding:"max(70px, calc(env(safe-area-inset-top, 20px) + 50px)) 24px 40px"}}>
        <button onClick={onClose} style={{position:"fixed",top:"max(16px, env(safe-area-inset-top, 16px))",right:16,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"50%",width:42,height:42,color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",zIndex:75,WebkitTapHighlightColor:"transparent","aria-label":"Close"}}>✕</button>
        {photo&&<div style={{width:"100%",height:160,borderRadius:18,overflow:"hidden",marginBottom:16}}><img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
        <Glass style={{marginBottom:14}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{data.brand}</div>
          <div style={{fontSize:22,fontWeight:500,marginTop:4}}>{data.strain}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:4}}>{sessions.length} session{sessions.length!==1?"s":""} · {[...data.types].join(", ")} · {[...data.classifications].join("/")}</div>
        </Glass>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[{l:"Rating",v:avgR},{l:"Vapor",v:avgV},{l:"Taste",v:avgT},{l:"Potency",v:avgP}].map((s,i)=><Glass key={i} style={{padding:12,textAlign:"center"}}><div style={{fontSize:18,fontFamily:"'JetBrains Mono',monospace",fontWeight:300}}>{s.v}</div><div style={{fontSize:7,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{s.l}</div></Glass>)}
        </div>
        {topEffects.length>0&&<Glass style={{marginBottom:14}}><ML>Common Effects</ML><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{topEffects.map(([eid,count])=>{const e=EFFECTS_LIST.find(x=>x.id===eid);return e?<span key={eid} style={{fontSize:9,padding:"4px 10px",borderRadius:12,background:`${accent}12`,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>{e.emoji} {e.label} ×{count}</span>:null})}</div></Glass>}
        <ML>All Sessions</ML>
        <Btn secondary onClick={()=>{haptic.tap();setShowCard(true)}} style={{marginBottom:12}}>✨ View Trading Card</Btn>
        {showCard&&<StrainTradingCard data={data} accent={accent} onClose={()=>setShowCard(false)} />}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {sessions.map(s=>{const z=getZone(s.finalTempF||500);return(
            <Glass key={s.id} onClick={()=>{onClose();setTimeout(()=>onSelect(s),100)}} style={{padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:12,fontWeight:500}}>{s.date}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{z.name} · {s.finalTempF}°F</div></div>
              <div style={{display:"flex",gap:1}}>{[1,2,3,4,5].map(i=><Leaf key={i} size={9} filled={i<=s.rating} accent={accent}/>)}</div>
            </Glass>
          )})}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// SESSION DETAIL MODAL (includes #6 repeat, #23 share)
// ═══════════════════════════════════════════════════════
function DetailModal({item,accent,onClose,onDelete,onRepeat,onShare,onEdit}) {
  const z=getZone(item.finalTempF||500);
  const [confirmDelete, setConfirmDelete] = useState(false);
  return (
    <div style={{position:"fixed",inset:0,zIndex:70,background:"rgba(4,4,12,0.96)",overflowY:"auto"}} onPointerDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{maxWidth:440,margin:"0 auto",padding:"max(70px, calc(env(safe-area-inset-top, 20px) + 50px)) 24px 40px"}}>
        <button onClick={onClose} style={{position:"fixed",top:"max(16px, env(safe-area-inset-top, 16px))",right:16,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"50%",width:42,height:42,color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",zIndex:75,WebkitTapHighlightColor:"transparent","aria-label":"Close"}}>✕</button>
        {item.photo&&<div style={{width:"100%",height:180,borderRadius:18,overflow:"hidden",marginBottom:14}}><img src={item.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
        <Glass style={{marginBottom:14}}><div style={{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{item.brand}</div><div style={{fontSize:22,fontWeight:500,marginTop:4}}>{item.strain}</div><div style={{display:"flex",gap:8,marginTop:6}}><span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{item.classification}</span><span style={{color:"rgba(255,255,255,0.15)"}}>·</span><span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{item.type}</span></div></Glass>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <Glass><ML>Temperature</ML><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:"50%",background:z.hex}}/><span style={{fontSize:13,fontWeight:600}}>{item.heatProfileName||z.name}</span></div>{item.finalTempF&&<div style={{fontSize:20,fontWeight:200,fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{item.finalTempF}°F</div>}</Glass>
          <Glass><ML>Duration</ML><div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.7)"}}>{item.duration>0?`${Math.floor(item.duration/60)}m ${item.duration%60}s`:"—"}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>{item.date} · {item.timeOfDay}</div></Glass>
        </div>
        <Glass style={{marginBottom:14}}><ML>Ratings</ML>{[{k:"vapor",l:"Vapor"},{k:"taste",l:"Taste"},{k:"potency",l:"Potency"},{k:"rating",l:"Overall"}].map(m=><div key={m.k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><span style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontFamily:"'JetBrains Mono',monospace",width:60}}>{m.l}</span><div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(s=><Leaf key={s} size={12} filled={s<=(item[m.k]||0)} accent={accent}/>)}</div></div>)}</Glass>
        {item.notes&&<Glass style={{marginBottom:14}}><ML>Notes</ML><p style={{fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.6,fontStyle:"italic"}}>"{item.notes}"</p></Glass>}
        {item.effects?.length>0&&<Glass style={{marginBottom:14}}><ML>Effects</ML><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{item.effects.map(eid=>{const e=EFFECTS_LIST.find(x=>x.id===eid);return e?<span key={eid} style={{fontSize:10,padding:"5px 10px",borderRadius:16,background:`${accent}15`,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>{e.emoji} {e.label}</span>:null})}</div></Glass>}
        {item.flavors?.length>0&&<Glass style={{marginBottom:14}}><ML>Flavor Notes</ML><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{item.flavors.map(f=><span key={f} style={{fontSize:10,padding:"5px 10px",borderRadius:16,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.5)",fontFamily:"'JetBrains Mono',monospace"}}>{f}</span>)}</div></Glass>}
        {/* Spotify Player */}
        {item.spotifyUrl&&(()=>{const m=item.spotifyUrl.match(/open\.spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/);if(!m)return null;return<Glass style={{marginBottom:14,padding:0,overflow:"hidden"}}><iframe src={`https://open.spotify.com/embed/${m[1]}/${m[2]}?theme=0`} width="100%" height="152" frameBorder="0" allow="encrypted-media" style={{borderRadius:18,display:"block"}}/></Glass>})()}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <Btn accent={accent} onClick={()=>onRepeat(item)}>🔄 Repeat This Sesh</Btn>
          <Btn secondary onClick={()=>onEdit(item)}>✎ Edit Session</Btn>
          <Btn secondary onClick={()=>onShare(item)}>📤 Share Card</Btn>
          {confirmDelete ? (
            <div style={{display:"flex",gap:8}}>
              <Btn secondary onClick={()=>setConfirmDelete(false)} style={{flex:1}}>Cancel</Btn>
              <Btn secondary onClick={()=>onDelete(item.id)} style={{flex:1,color:"#ef4444",borderColor:"rgba(239,68,68,0.3)"}}>Confirm Delete</Btn>
            </div>
          ) : (
            <Btn secondary onClick={()=>setConfirmDelete(true)} style={{color:"#ef4444"}}>Delete</Btn>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// FEATURE #23: SHAREABLE SESSION CARD
// ═══════════════════════════════════════════════════════
function ShareCard({item,accent,onClose}) {
  const cardRef = useRef(null);
  const z = getZone(item.finalTempF||500);
  const download = async () => {
    try {
      if (!window.html2canvas) {
        await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s)});
      }
      const canvas = await window.html2canvas(cardRef.current,{backgroundColor:"#04040c",scale:2,useCORS:true});
      const blob = await new Promise(r=>canvas.toBlob(r,"image/png"));
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],"session.png",{type:"image/png"})]})){
        await navigator.share({files:[new File([blob],"puffco-session.png",{type:"image/png"})],title:`${item.strain} — ${item.rating}⭐`});
      } else {
        const link=document.createElement("a");link.download=`puffco-${item.strain.replace(/\s+/g,"-").toLowerCase()}-${item.date}.png`;link.href=canvas.toDataURL("image/png");link.click();
      }
    } catch { alert("Screenshot the card to share!"); }
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:80,background:"rgba(4,4,12,0.96)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}} onPointerDown={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div ref={cardRef} style={{borderRadius:20,overflow:"hidden",background:"#0a0a0a",border:`2px solid ${accent}30`}}>
          {item.photo&&<div style={{width:"100%",height:160,overflow:"hidden"}}><img src={item.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
          <div style={{padding:"20px 24px"}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{item.brand}</div>
            <div style={{fontSize:20,fontWeight:600,marginTop:4}}>{item.strain}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
              <span style={{fontSize:10,padding:"3px 10px",borderRadius:10,background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)"}}>{item.type}</span>
              <span style={{fontSize:10,padding:"3px 10px",borderRadius:10,background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)"}}>{item.classification}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:12}}>
              <div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(i=><Leaf key={i} size={14} filled={i<=item.rating} accent={accent}/>)}</div>
              <span style={{fontSize:13,fontWeight:600}}>{item.rating}/5</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:z.hex}}/><span style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>{z.name} · {item.finalTempF}°F</span>
            </div>
            {item.effects?.length>0&&<div style={{display:"flex",gap:4,marginTop:10,flexWrap:"wrap"}}>{item.effects.slice(0,4).map(eid=>{const e=EFFECTS_LIST.find(x=>x.id===eid);return e?<span key={eid} style={{fontSize:8,padding:"3px 8px",borderRadius:8,background:`${accent}15`,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>{e.emoji} {e.label}</span>:null})}</div>}
            {item.notes&&<p style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontStyle:"italic",marginTop:10,lineHeight:1.5}}>"{item.notes.slice(0,120)}{item.notes.length>120?"...":""}"</p>}
          </div>
          <div style={{padding:"12px 24px",borderTop:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace"}}>{item.date}</span>
            <span style={{fontSize:9,color:accent,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>puffco-companion.web.app</span>
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <Btn accent={accent} onClick={download} style={{flex:1}}>{navigator.share?"Share":"Save"}</Btn>
          <Btn secondary onClick={onClose} style={{flex:"0 0 80px"}}>Close</Btn>
        </div>
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PuffcoCompanion));
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }
  </script>
</body>
