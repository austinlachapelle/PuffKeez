function ls(key, fb) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } }
function lsSet(key, v) { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }

// ─── Persistent Storage (localStorage) ──────────
async function storageGet(key, fb) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fb;
  } catch {
    return fb;
  }
}
async function storageSet(key, v) {
  try {
    localStorage.setItem(key, JSON.stringify(v));
  } catch {}
}

// ─── PFP Frame SVG Component ──────────────────────────
function PfpFrame({ frameId, size = 72, accent = "#6C5CE7" }) {
  if (!frameId || frameId === "none") return null;
  const s = size, pad = Math.round(s * 0.22), full = s + pad * 2;
  const cx = full / 2, cy = full / 2;
  const ri = s / 2 + 1; // inner radius (just outside avatar)
  const ro = s / 2 + pad * 0.85; // outer radius
  const style = { position: "absolute", top: -pad, left: -pad, pointerEvents: "none" };
  const deg2rad = d => d * Math.PI / 180;
  const polar = (angle, radius) => [cx + radius * Math.cos(deg2rad(angle - 90)), cy + radius * Math.sin(deg2rad(angle - 90))];

  const frames = {
    // Lv2: Thin geometric octagon
    "thin-ring": (() => {
      const pts = Array.from({length:8},(_,i)=>polar(i*45, ro)).map(p=>p.join(",")).join(" ");
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <polygon points={pts} fill="none" stroke={accent} strokeWidth="1.2" opacity="0.5" strokeLinejoin="round"/>
      </svg>;
    })(),

    // Lv3: Double-stroke rounded square with corner notches
    "dashed": (() => {
      const r2 = ro * 0.92, inset = pad * 0.4, corner = pad * 0.5;
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <rect x={cx-r2} y={cy-r2} width={r2*2} height={r2*2} rx={corner} fill="none" stroke={accent} strokeWidth="1.5" opacity="0.5"/>
        <rect x={cx-ri} y={cy-ri} width={ri*2} height={ri*2} rx={corner*0.7} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.25"/>
        {[[-1,-1],[1,-1],[1,1],[-1,1]].map(([dx,dy],i)=><circle key={i} cx={cx+dx*(r2-2)} cy={cy+dy*(r2-2)} r="1.5" fill={accent} opacity="0.4"/>)}
      </svg>;
    })(),

    // Lv4: Stacked chevrons pointing outward — angular energy
    "double-ring": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="1" opacity="0.3"/>
        {[0,45,90,135,180,225,270,315].map(deg => {
          const a = deg2rad(deg-90);
          const mx = cx + (ro-2) * Math.cos(a), my = cy + (ro-2) * Math.sin(a);
          const perpA = a + Math.PI/2;
          const tipA = a;
          const w = pad*0.25;
          const pts = [
            [mx - w*Math.cos(perpA), my - w*Math.sin(perpA)],
            [mx + pad*0.35*Math.cos(tipA), my + pad*0.35*Math.sin(tipA)],
            [mx + w*Math.cos(perpA), my + w*Math.sin(perpA)],
          ].map(p=>p.join(",")).join(" ");
          return <polygon key={deg} points={pts} fill={accent} opacity="0.4"/>;
        })}
      </svg>;
    })(),

    // Lv5: Spinning blade / shuriken shape
    "glow-pulse": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        {[0,60,120,180,240,300].map(deg => {
          const a1 = deg2rad(deg-90), a2 = deg2rad(deg-90+25), a3 = deg2rad(deg-90-25);
          const tip = polar(deg, ro+2);
          const base1 = [cx + ri * Math.cos(a2), cy + ri * Math.sin(a2)];
          const base2 = [cx + ri * Math.cos(a3), cy + ri * Math.sin(a3)];
          return <polygon key={deg} points={`${tip[0]},${tip[1]} ${base1[0]},${base1[1]} ${base2[0]},${base2[1]}`} fill={accent} opacity="0.3"/>;
        })}
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="1.2" opacity="0.5"/>
      </svg>;
    })(),

    // Lv6: Botanical — leaf shapes radiating from the ring
    "leaf-ring": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.35"/>
        {[0,36,72,108,144,180,216,252,288,324].map(deg => {
          const a = deg2rad(deg-90);
          const base = [cx+(ri+2)*Math.cos(a), cy+(ri+2)*Math.sin(a)];
          const tip = [cx+(ro+1)*Math.cos(a), cy+(ro+1)*Math.sin(a)];
          const perp = deg2rad(deg);
          const w = pad*0.18;
          const ctrl1 = [base[0]+w*Math.cos(perp)+(tip[0]-base[0])*0.4, base[1]+w*Math.sin(perp)+(tip[1]-base[1])*0.4];
          const ctrl2 = [base[0]-w*Math.cos(perp)+(tip[0]-base[0])*0.4, base[1]-w*Math.sin(perp)+(tip[1]-base[1])*0.4];
          return <path key={deg} d={`M${base[0]},${base[1]} Q${ctrl1[0]},${ctrl1[1]} ${tip[0]},${tip[1]} Q${ctrl2[0]},${ctrl2[1]} ${base[0]},${base[1]}Z`} fill={accent} opacity="0.35"/>;
        })}
      </svg>;
    })(),

    // Lv7: Hexagonal — your favorite. Clean hex with inner detail
    "hex": (() => {
      const outerPts = Array.from({length:6},(_,i)=>polar(i*60, ro)).map(p=>p.join(",")).join(" ");
      const innerPts = Array.from({length:6},(_,i)=>polar(i*60, ri+2)).map(p=>p.join(",")).join(" ");
      const midPts = Array.from({length:6},(_,i)=>polar(i*60+30, (ri+ro)/2)).map(p=>p.join(",")).join(" ");
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <polygon points={outerPts} fill="none" stroke={accent} strokeWidth="1.8" opacity="0.6" strokeLinejoin="round"/>
        <polygon points={innerPts} fill="none" stroke={accent} strokeWidth="0.6" opacity="0.2" strokeLinejoin="round"/>
        {Array.from({length:6},(_,i)=>{
          const p1=polar(i*60,ri+2),p2=polar(i*60,ro);
          return <line key={i} x1={p1[0]} y1={p1[1]} x2={p2[0]} y2={p2[1]} stroke={accent} strokeWidth="0.5" opacity="0.2"/>;
        })}
        {Array.from({length:6},(_,i)=>{
          const p=polar(i*60+30,(ri+ro)/2);
          return <circle key={i} cx={p[0]} cy={p[1]} r={pad*0.08} fill={accent} opacity="0.4"/>;
        })}
      </svg>;
    })(),

    // Lv8: Flame corona — jagged flame tips around the ring
    "flame-ring": (() => {
      const count = 12;
      let path = "";
      for (let i = 0; i < count; i++) {
        const deg = i * (360/count);
        const innerP = polar(deg, ri+1);
        const tipP = polar(deg + 360/count/2, ro + pad*0.15);
        const nextInner = polar(deg + 360/count, ri+1);
        path += `${i===0?"M":"L"}${innerP[0]},${innerP[1]} Q${polar(deg+360/count/4,ro*0.8)[0]},${polar(deg+360/count/4,ro*0.8)[1]} ${tipP[0]},${tipP[1]} Q${polar(deg+360/count*3/4,ro*0.8)[0]},${polar(deg+360/count*3/4,ro*0.8)[1]} ${nextInner[0]},${nextInner[1]} `;
      }
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <path d={path+"Z"} fill={accent} opacity="0.15" stroke={accent} strokeWidth="1" strokeOpacity="0.5"/>
      </svg>;
    })(),

    // Lv9: Royal crest — ornate pointed crown shape at top with flanking wings
    "crown": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="1.2" opacity="0.4"/>
        {/* Crown points at top */}
        {[-40,-20,0,20,40].map((offset,i)=>{
          const p = polar(offset, ro + (i===2?pad*0.3:i===1||i===3?pad*0.15:0));
          const base1 = polar(offset-8, ri+2);
          const base2 = polar(offset+8, ri+2);
          return <polygon key={i} points={`${p[0]},${p[1]} ${base1[0]},${base1[1]} ${base2[0]},${base2[1]}`} fill={accent} opacity={i===2?0.5:0.3}/>;
        })}
        {/* Gems at crown tips */}
        {[-40,0,40].map((offset,i)=>{
          const p = polar(offset, ro + (i===1?pad*0.3:0));
          return <circle key={i} cx={p[0]} cy={p[1]} r={pad*0.07} fill={accent} opacity="0.7"/>;
        })}
        {/* Side filigree */}
        {[130,230].map(deg=>{
          const p = polar(deg, ro-1);
          return <circle key={deg} cx={p[0]} cy={p[1]} r={pad*0.12} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.25"/>;
        })}
      </svg>;
    })(),

    // Lv10: Faceted gem — 12-sided polygon with inner facet lines creating diamond cuts
    "diamond": (() => {
      const outerPts = Array.from({length:12},(_,i)=>polar(i*30, ro));
      const innerPts = Array.from({length:12},(_,i)=>polar(i*30+15, (ri+ro)/2*0.95));
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <polygon points={outerPts.map(p=>p.join(",")).join(" ")} fill="none" stroke={accent} strokeWidth="1.5" opacity="0.5" strokeLinejoin="round"/>
        {outerPts.map((p,i)=>{
          const next = innerPts[i];
          const prev = innerPts[(i+11)%12];
          return <g key={i}>
            <line x1={p[0]} y1={p[1]} x2={next[0]} y2={next[1]} stroke={accent} strokeWidth="0.6" opacity="0.25"/>
            <line x1={p[0]} y1={p[1]} x2={prev[0]} y2={prev[1]} stroke={accent} strokeWidth="0.6" opacity="0.25"/>
          </g>;
        })}
        <polygon points={innerPts.map(p=>p.join(",")).join(" ")} fill="none" stroke={accent} strokeWidth="0.5" opacity="0.15"/>
      </svg>;
    })(),

    // Lv11: Sacred geometry — flower of life pattern around the ring
    "ornate": (() => {
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        <circle cx={cx} cy={cy} r={ro} fill="none" stroke={accent} strokeWidth="1" opacity="0.3"/>
        <circle cx={cx} cy={cy} r={ri+1} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.2"/>
        {Array.from({length:6},(_,i)=>{
          const p = polar(i*60, (ri+ro)/2);
          const circR = (ro-ri)/2*0.9;
          return <circle key={i} cx={p[0]} cy={p[1]} r={circR} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.3"/>;
        })}
        {Array.from({length:6},(_,i)=>{
          const p = polar(i*60+30, (ri+ro)/2);
          const circR = (ro-ri)/2*0.5;
          return <circle key={`s${i}`} cx={p[0]} cy={p[1]} r={circR} fill={accent} opacity="0.12"/>;
        })}
        {Array.from({length:12},(_,i)=>{
          const p = polar(i*30, ro);
          return <circle key={`d${i}`} cx={p[0]} cy={p[1]} r={pad*0.04} fill={accent} opacity="0.5"/>;
        })}
      </svg>;
    })(),

    // Lv12: Legendary — complex layered mandala with radiating beams
    "legendary": (() => {
      const starOuter = Array.from({length:8},(_,i)=>{
        const isSpike = i%2===0;
        return polar(i*45, isSpike ? ro+pad*0.2 : (ri+ro)/2*0.95);
      });
      return <svg width={full} height={full} viewBox={`0 0 ${full} ${full}`} style={style}>
        {/* Outer 8-point star */}
        <polygon points={starOuter.map(p=>p.join(",")).join(" ")} fill={accent} opacity="0.08" stroke={accent} strokeWidth="1" strokeOpacity="0.4" strokeLinejoin="round"/>
        {/* Inner hex */}
        <polygon points={Array.from({length:6},(_,i)=>polar(i*60,ri+2)).map(p=>p.join(",")).join(" ")} fill="none" stroke={accent} strokeWidth="0.8" opacity="0.25" strokeLinejoin="round"/>
        {/* Radiating beam lines */}
        {Array.from({length:24},(_,i)=>{
          const p1=polar(i*15,ri+1),p2=polar(i*15,i%3===0?ro+pad*0.15:ro-pad*0.05);
          return <line key={i} x1={p1[0]} y1={p1[1]} x2={p2[0]} y2={p2[1]} stroke={accent} strokeWidth={i%3===0?"0.8":"0.4"} opacity={i%3===0?0.35:0.12}/>;
        })}
        {/* Gem dots at cardinal spike tips */}
        {[0,90,180,270].map(deg=>{
          const p=polar(deg,ro+pad*0.2);
          return <circle key={deg} cx={p[0]} cy={p[1]} r={pad*0.08} fill={accent} opacity="0.6"/>;
        })}
        {/* Ring of dots */}
        {Array.from({length:12},(_,i)=>{
          const p=polar(i*30,ro-pad*0.05);
          return <circle key={`r${i}`} cx={p[0]} cy={p[1]} r={pad*0.035} fill={accent} opacity="0.3"/>;
        })}
      </svg>;
    })(),
  };
  return frames[frameId] || null;
}
function calcXP(s){let x=0;const seen=new Set();s.forEach(e=>{x+=50;if(e.rating===5)x+=25;if(e.effects?.length)x+=10;if(e.notes?.trim())x+=10;if(e.photo)x+=15;const k=`${e.brand}-${e.strain}`;if(!seen.has(k)){seen.add(k);x+=30}});return x}
function getLvl(xp){let c=LEVELS[0];for(const l of LEVELS){if(xp>=l.xp)c=l;else break}const ni=LEVELS.findIndex(l=>l.level===c.level)+1;const n=ni<LEVELS.length?LEVELS[ni]:null;return{...c,totalXP:xp,next:n,progress:n?Math.min((xp-c.xp)/(n.xp-c.xp),1):1,progressXP:n?xp-c.xp:0,neededXP:n?n.xp-c.xp:1}}
function getStreak(s){if(!s.length)return 0;const d=[...new Set(s.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));const t=new Date().toISOString().split("T")[0];let c=0;for(let i=0;i<d.length;i++){const e=new Date(t);e.setDate(e.getDate()-i);if(d[i]===e.toISOString().split("T")[0])c++;else break}return c}

// ─── Smoke Background ──────────────────────────────────
// CSS custom properties for instant accent switching.
// Uses useRef to update CSS vars WITHOUT re-rendering the component,
// so SVG filters and animations are never rebuilt.
// ─── Smoke Background ──────────────────────────────────
// Generates vertically-tileable smoke textures using canvas noise.
// Accent color is baked directly into the texture pixels.
// Regenerates textures when accent changes. After generation:
// pure CSS translateY animation on pre-rendered images = zero lag.
function SmokeBackground({ accent = "#6C5CE7", accent2 }) {
  const containerRef = useRef(null);
  const [textures, setTextures] = useState(null);
  const noiseCache = useRef(null);

  // Noise generation functions — cached so we only compute noise grids once
  useEffect(() => {
    const W = 128, H = 256;

    function makeNoise(seed) {
      const grid = [];
      let s = seed;
      const rand = () => { s = (s * 16807 + 0) % 2147483647; return (s & 0x7fffffff) / 2147483647; };
      for (let i = 0; i < 4096; i++) grid.push(rand());
      return (x, y) => {
        const gw = 64;
        const xi = ((Math.floor(x) % gw) + gw) % gw;
        const yi = ((Math.floor(y) % gw) + gw) % gw;
        const xf = x - Math.floor(x), yf = y - Math.floor(y);
        const sx = xf * xf * (3 - 2 * xf), sy = yf * yf * (3 - 2 * yf);
        const i00 = grid[(yi * gw + xi) % 4096];
        const i10 = grid[(yi * gw + ((xi + 1) % gw)) % 4096];
        const i01 = grid[(((yi + 1) % gw) * gw + xi) % 4096];
        const i11 = grid[(((yi + 1) % gw) * gw + ((xi + 1) % gw)) % 4096];
        return i00 * (1 - sx) * (1 - sy) + i10 * sx * (1 - sy) + i01 * (1 - sx) * sy + i11 * sx * sy;
      };
    }

    function fbm(fn, x, y, oct) {
      let v = 0, a = 1, f = 1, m = 0;
      for (let i = 0; i < oct; i++) { v += fn(x * f, y * f) * a; m += a; a *= 0.5; f *= 2; }
      return v / m;
    }

    // Pre-compute noise value arrays (heavy work, done once)
    function computeNoiseField(seed) {
      const n1 = makeNoise(seed), n2 = makeNoise(seed + 100);
      const field = new Float32Array(W * H);
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          // Very low frequency = big soft billowy shapes
          const nx = x / W * 3.5;
          const ny = y / H * 5;
          // Gentle domain warping
          const wx = fbm(n2, nx + 3.3, ny + 1.7, 3) * 1.2;
          const wy = fbm(n2, nx + 7.1, ny + 4.2, 3) * 1.2;
          let v = fbm(n1, nx + wx, ny + wy, 3);

          // Wide vertical tile zone — 40% on each end
          const tileZone = 0.4;
          const yNorm = y / H;
          let tileFade = 1;
          if (yNorm < tileZone) tileFade = yNorm / tileZone;
          if (yNorm > 1 - tileZone) tileFade = (1 - yNorm) / tileZone;
          tileFade = tileFade * tileFade * (3 - 2 * tileFade);

          const xFade = 1 - Math.pow((x / W - 0.5) * 2, 4) * 0.3;
          // Very soft power curve
          v = Math.pow(v, 1.05) * tileFade * xFade;
          field[y * W + x] = Math.max(0, Math.min(1, v));
        }
      }

      // Single blur pass — lightweight
      const blurred = new Float32Array(W * H);
      const br = 3;
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          let sum = 0, count = 0;
          for (let dy = -br; dy <= br; dy++) {
            for (let dx = -br; dx <= br; dx++) {
              sum += field[Math.max(0,Math.min(H-1,y+dy)) * W + Math.max(0,Math.min(W-1,x+dx))];
              count++;
            }
          }
          blurred[y * W + x] = sum / count;
        }
      }
      return blurred;
    }

    // Stagger texture generation to avoid blocking the main thread
    setTimeout(() => {
      const f1 = computeNoiseField(42);
      setTimeout(() => {
        const f2 = computeNoiseField(137);
        setTimeout(() => {
          const f3 = computeNoiseField(271);
          noiseCache.current = { W, H, fields: [f1, f2, f3] };
          renderTextures(accent, accent2);
        }, 50);
      }, 50);
    }, 200);
  }, []);

  // Render textures with specific accent color — fast because noise is cached
  function renderTextures(color1, color2) {
    const cache = noiseCache.current;
    if (!cache) return;
    const { W, H, fields } = cache;
    const r1 = parseInt(color1.slice(1, 3), 16);
    const g1 = parseInt(color1.slice(3, 5), 16);
    const b1 = parseInt(color1.slice(5, 7), 16);
    const r2 = color2 ? parseInt(color2.slice(1, 3), 16) : r1;
    const g2 = color2 ? parseInt(color2.slice(3, 5), 16) : g1;
    const b2 = color2 ? parseInt(color2.slice(5, 7), 16) : b1;

    // Each layer gets a different blend ratio: 0.0=color1, 1.0=color2
    const blendRatios = [0.0, 0.5, 1.0];
    const opacities = [0.3, 0.24, 0.18];
    const result = fields.map((field, fi) => {
      const c = document.createElement("canvas");
      c.width = W; c.height = H;
      const ctx = c.getContext("2d");
      const img = ctx.createImageData(W, H);
      const op = opacities[fi];
      const blend = blendRatios[fi];
      const cr = Math.round(r1 + (r2 - r1) * blend);
      const cg = Math.round(g1 + (g2 - g1) * blend);
      const cb = Math.round(b1 + (b2 - b1) * blend);

      for (let i = 0; i < W * H; i++) {
        const v = field[i] * op;
        const idx = i * 4;
        img.data[idx] = cr;
        img.data[idx + 1] = cg;
        img.data[idx + 2] = cb;
        img.data[idx + 3] = Math.round(v * 255);
      }
      ctx.putImageData(img, 0, 0);
      return c.toDataURL();
    });

    setTextures(result);
  }

  // Regenerate textures when accent changes — only pixel coloring, noise is cached
  const prevAccent = useRef(accent);
  const prevAccent2 = useRef(accent2);
  useEffect(() => {
    if ((accent !== prevAccent.current || accent2 !== prevAccent2.current) && noiseCache.current) {
      prevAccent.current = accent;
      prevAccent2.current = accent2;
      renderTextures(accent, accent2);
    }
  }, [accent, accent2]);

  return (
    <div ref={containerRef} style={{
      position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none",
      overflow: "hidden", background: "#04040c",
    }}>
      <style>{`
        @keyframes sr1{0%{transform:translateY(0%) scale(1.08)}100%{transform:translateY(-33.333%) scale(1.08)}}
        @keyframes sr2{0%{transform:translateY(0%) scale(1.11)}100%{transform:translateY(-33.333%) scale(1.11)}}
        @keyframes sr3{0%{transform:translateY(0%) scale(1.14)}100%{transform:translateY(-33.333%) scale(1.14)}}
        .sl{position:absolute;left:-8%;width:116%;will-change:transform;filter:blur(12px)}
        .sl img{width:100%;height:33.334%;display:block}
      `}</style>

      {textures && <>
        {/* 3 copies per layer = seam every 33%. Prime durations (53s, 41s, 31s)
            mean the 3 layers' seams never coincide. One layer's seam is always
            hidden by the other two layers' mid-texture regions. */}
        <div className="sl" style={{top:0,height:"300%",animation:"sr1 53s linear infinite",opacity:0.7}}>
          <img src={textures[0]} alt="" />
          <img src={textures[0]} alt="" />
          <img src={textures[0]} alt="" />
        </div>
        <div className="sl" style={{top:0,height:"300%",animation:"sr2 41s linear infinite",opacity:0.5,left:"-6%",width:"112%"}}>
          <img src={textures[1]} alt="" />
          <img src={textures[1]} alt="" />
          <img src={textures[1]} alt="" />
        </div>
        <div className="sl" style={{top:0,height:"300%",animation:"sr3 31s linear infinite",opacity:0.35}}>
          <img src={textures[2]} alt="" />
          <img src={textures[2]} alt="" />
          <img src={textures[2]} alt="" />
        </div>
      </>}

      {/* Bottom glow — accent colored, blends both for ombré */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"25%",background:accent2?`radial-gradient(ellipse 120% 100% at 30% 100%, ${accent}22 0%, transparent 60%), radial-gradient(ellipse 120% 100% at 70% 100%, ${accent2}22 0%, transparent 60%)`:`radial-gradient(ellipse 120% 100% at 50% 100%, ${accent}22 0%, ${accent}08 40%, transparent 75%)`}} />

      {/* Top fade to black */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:"30%",background:"linear-gradient(to bottom, #04040c 0%, #04040cbb 35%, transparent 100%)"}} />

      {/* Bottom edge blend */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"8%",background:"linear-gradient(to top, #04040c, transparent)"}} />
    </div>
  );
}

function compressPhoto(file, maxSize=512) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w=img.width, h=img.height;
        if(w>h){if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize}}else{if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize}}
        canvas.width=w;canvas.height=h;canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",0.75));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

          );
        });

        </div>

// ─── Autocomplete Input ────────────────────────────────
function AutoInput({ value, onChange, suggestions, placeholder, style }) {
  const [open, setOpen] = useState(false);
  const [focused, setFocused] = useState(false);
  const q = value.toLowerCase().trim();
  const filtered = q ? suggestions.filter(s => s.toLowerCase().includes(q) && s.toLowerCase() !== q) : suggestions;
  const show = focused && filtered.length > 0;

  return (
    <div style={{ position: "relative" }}>
      <input
        value={value}
        onChange={e => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => { setFocused(true); setOpen(true); }}
        onBlur={() => setTimeout(() => { setFocused(false); setOpen(false); }, 150)}
        placeholder={placeholder}
        style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "10px 14px", fontSize: 13, color: "white", outline: "none", fontFamily: "'Syne','Helvetica Neue',sans-serif", ...style }}
      />
      {show && open && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, zIndex: 10, marginTop: 4,
          background: "rgba(12,12,24,0.95)", border: "1px solid rgba(255,255,255,0.1)",
          borderRadius: 12, overflow: "hidden", maxHeight: 160, overflowY: "auto",
        }}>
          {filtered.slice(0, 8).map(s => (
            <button key={s} onMouseDown={e => { e.preventDefault(); onChange(s); setOpen(false); }}
              style={{
                display: "block", width: "100%", textAlign: "left", padding: "10px 14px",
                background: "transparent", border: "none", borderBottom: "1px solid rgba(255,255,255,0.04)",
                color: "rgba(255,255,255,0.7)", fontSize: 12, cursor: "pointer",
                fontFamily: "'Syne','Helvetica Neue',sans-serif",
                WebkitTapHighlightColor: "transparent",
              }}>
              {s}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// SESSION OVERLAY (includes #16 photo upload)

function SessionOverlay({sessionPhase,setSessionPhase,sessionData,setSessionData,ratingData,setRatingData,selectedTempF,setSelectedTempF,timeLeft,setTimeLeft,totalDuration,boosts,setBoosts,isPaused,setIsPaused,accent,heatProfiles,activeHP,completeSession,onClose,photoRef,knownBrands,knownStrains,stash}) {
  const zone = getZone(selectedTempF + boosts*18);
  const effectiveTempF = selectedTempF + boosts*18;
  const fileRef = useRef(null);

  // If a brand is selected, show strains from that brand first, then all others
  const brandStrains = useMemo(() => {
    if (!sessionData.brand.trim() || !stash) return knownStrains || [];
    const brandMatch = sessionData.brand.trim().toLowerCase();
    const fromBrand = [...new Set(stash.filter(s => s.brand?.toLowerCase() === brandMatch).map(s => s.strain).filter(Boolean))].sort();
    const others = (knownStrains || []).filter(s => !fromBrand.map(x=>x.toLowerCase()).includes(s.toLowerCase()));
    return [...fromBrand, ...others];
  }, [sessionData.brand, stash, knownStrains]);

  const STEPS = [
    { id:"details", label:"Load" },
    { id:"select", label:"Heat" },
    { id:"heating", label:"Sesh" },
    { id:"active", label:"Sesh" },
    { id:"effects", label:"Effects" },
    { id:"rating", label:"Rate" },
  ];
  // Collapse heating+active into one visual step
  const visualSteps = ["details","select","active","effects","rating"];
  const currentVisual = (sessionPhase === "heating") ? "active" : sessionPhase;
  const currentIdx = visualSteps.indexOf(currentVisual);
  const stepLabels = ["Load","Heat","Session","Effects","Rate"];

  return (
    <div style={{position:"fixed",inset:0,zIndex:60,background:"rgba(4,4,12,0.98)",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:440,margin:"0 auto",padding:"0 24px",display:"flex",flexDirection:"column",minHeight:"100%",paddingTop:"max(54px, calc(env(safe-area-inset-top, 28px) + 26px))",paddingBottom:40}}>
        {/* Close button */}
        <button onClick={onClose} style={{position:"fixed",top:"max(16px, env(safe-area-inset-top, 16px))",right:16,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"50%",width:40,height:40,color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",zIndex:65,WebkitTapHighlightColor:"transparent"}}>✕</button>

        {/* Step Indicator */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:0,marginBottom:24,padding:"0 10px"}}>
          {visualSteps.map((step, i) => {
            const isActive = i === currentIdx;
            const isDone = i < currentIdx;
            return (
              <div key={step} style={{display:"flex",alignItems:"center",flex:1}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
                  <div style={{
                    width:isActive?28:isDone?22:18, height:isActive?28:isDone?22:18,
                    borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
                    
                    background: isActive ? accent : isDone ? `${accent}40` : "rgba(255,255,255,0.04)",
                    border: `1.5px solid ${isActive ? accent : isDone ? accent+"60" : "rgba(255,255,255,0.08)"}`,
                    boxShadow: isActive ? `0 0 12px ${accent}40` : "none",
                  }}>
                    {isDone ? (
                      <span style={{fontSize:10,color:"white"}}>✓</span>
                    ) : (
                      <span style={{fontSize:8,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:isActive?"#000":"rgba(255,255,255,0.25)"}}>{i+1}</span>
                    )}
                  </div>
                  <span style={{
                    fontSize:7, letterSpacing:1.5, textTransform:"uppercase",
                    fontFamily:"'JetBrains Mono',monospace", marginTop:5,
                    color: isActive ? accent : isDone ? "rgba(255,255,255,0.4)" : "rgba(255,255,255,0.15)",
                    fontWeight: isActive ? 700 : 400,
                    
                  }}>{stepLabels[i]}</span>
                </div>
                {i < visualSteps.length - 1 && (
                  <div style={{
                    flex:1, height:1.5, borderRadius:1, margin:"0 -4px", marginBottom:16,
                    background: isDone ? `${accent}50` : "rgba(255,255,255,0.06)",
                    transition:"background 0.4s",
                  }} />
                )}
              </div>
            );
          })}
        </div>

        {/* Close button */}
        {(sessionPhase==="details"||sessionPhase==="select")&&<button onClick={onClose} style={{position:"absolute",top:20,right:24,background:"rgba(255,255,255,0.06)",border:"none",borderRadius:"50%",width:36,height:36,color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>✕</button>}

              // Smart temp suggestion: check if this strain was logged before
              const strainHistory = stash.filter(s=>s.strain?.toLowerCase()===sessionData.strain.trim().toLowerCase()&&s.brand?.toLowerCase()===sessionData.brand.trim().toLowerCase()&&s.rating>0);
              let suggestedTemp = TEMP_SUGGESTIONS[sessionData.type]||activeHP.tempF;
              if(strainHistory.length>0){
                // Use the temp from the highest-rated session of this strain
                const best = strainHistory.sort((a,b)=>(b.rating||0)-(a.rating||0))[0];
                if(best.finalTempF) suggestedTemp = best.finalTempF;
              }
              setSelectedTempF(suggestedTemp);
              setSessionPhase("select");
            }}}>Next — Select Heat</Btn>
            <Btn secondary onClick={()=>{setSessionData(p=>({...p,brand:"Quick",strain:"Session"}));setSessionPhase("select")}} style={{marginTop:8}}>Skip Logging</Btn>
          </div>
        )}

        {/* SELECT HEAT — uses custom profiles */}
        {sessionPhase==="select"&&(
          <div className="fu fu1" style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{textAlign:"center",marginBottom:28}}>
              <h2 style={{fontSize:22,fontWeight:300,letterSpacing:4,textTransform:"uppercase"}}>Select Heat</h2>
              {(()=>{
                const hist = stash.filter(s=>s.strain?.toLowerCase()===sessionData.strain.trim().toLowerCase()&&s.brand?.toLowerCase()===sessionData.brand.trim().toLowerCase()&&s.rating>0);
                const best = hist.sort((a,b)=>(b.rating||0)-(a.rating||0))[0];
                return best?.finalTempF === selectedTempF && hist.length > 0 ?
                  <p style={{color:accent,fontSize:10,marginTop:6,fontFamily:"'JetBrains Mono',monospace",letterSpacing:1}}>★ {selectedTempF}°F suggested from your best {sessionData.strain} session</p> :
                  <p style={{color:"rgba(255,255,255,0.3)",fontSize:12,marginTop:6}}>Tap a profile or set custom temp</p>;
              })()}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              {heatProfiles.map(p=>{const z=getZone(p.tempF);const sel=selectedTempF===p.tempF;return(
                <Glass key={p.id} onClick={()=>setSelectedTempF(p.tempF)} glow={sel?p.color:null} style={{padding:"16px 14px",textAlign:"center",transform:sel?"scale(1.03)":"scale(1)"}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:p.color,margin:"0 auto 8px",boxShadow:sel?`0 0 10px ${p.color}60`:"none"}}/>
                  <div style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:sel?"white":"rgba(255,255,255,0.4)"}}>{p.name}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{p.tempF}°F · {p.time}s</div>
                </Glass>
              )})}
            </div>
            {/* Custom temp input */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24}}>
              <ML style={{marginBottom:0,whiteSpace:"nowrap"}}>Custom °F</ML>
              <input type="range" min={400} max={620} value={selectedTempF} onChange={e=>setSelectedTempF(Number(e.target.value))} style={{flex:1,accentColor:accent}} />
              <span style={{fontSize:14,fontFamily:"'JetBrains Mono',monospace",fontWeight:500,minWidth:50,textAlign:"right"}}>{selectedTempF}°</span>
            </div>
            <Btn accent={getZone(selectedTempF).hex} onClick={()=>{setSessionPhase("heating");if(navigator.vibrate)navigator.vibrate([80,60,80,60,120])}}>⚡ Begin Session</Btn>
          </div>
        )}

        {/* HEATING / ACTIVE */}
        {(sessionPhase==="heating"||sessionPhase==="active")&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{position:"relative",width:220,height:220,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:32}}>
              <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`3px solid ${zone.hex}`,opacity:0.3}}/>
              <div style={{width:160,height:160,borderRadius:"50%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"rgba(4,4,12,0.9)",border:`2px solid ${zone.hex}40`,boxShadow:`0 0 50px ${zone.hex}40`}}>
                {sessionPhase==="heating"?<span style={{fontSize:48}}>🔥</span>:<>
                  <span style={{fontSize:52,fontWeight:200,fontFamily:"'JetBrains Mono',monospace",color:"white"}}>{timeLeft}</span>
                  {totalDuration<=10&&<div style={{position:"absolute",bottom:22,left:"50%",transform:"translateX(-50%)",display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:4,height:4,borderRadius:"50%",background:"#fbbf24"}}/>
                    <span style={{fontSize:7,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",color:"#fbbf24",fontWeight:700,whiteSpace:"nowrap"}}>Terp Zone</span>
                    <div style={{width:4,height:4,borderRadius:"50%",background:"#fbbf24"}}/>
                  </div>}
                </>}
                <span style={{fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:6}}>{sessionPhase==="heating"?"heating...":`${zone.name} · ${effectiveTempF}°F`}</span>
              </div>
            </div>
            <p style={{color:"rgba(255,255,255,0.35)",fontSize:12,marginBottom:4}}>{sessionPhase==="heating"?"Wait for the double buzz...":timeLeft<=0?"Timer done — end when ready":"Enjoy your session"}</p>
            {/* Terp Timer Bar */}
            {sessionPhase==="active"&&totalDuration<=10&&(
              <div style={{width:"80%",marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:7,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",color:"#fbbf24"}}>Terp Zone</span>
                  <span style={{fontSize:7,fontFamily:"'JetBrains Mono',monospace",color:"#fbbf24"}}>{10-totalDuration}s</span>
                </div>
                <div style={{height:3,borderRadius:2,background:"rgba(251,191,36,0.1)",overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:2,background:"#fbbf24",width:`${(1-totalDuration/10)*100}%`}}/>
                </div>
              </div>
            )}
            {/* Spotify Player during session */}
            {sessionPhase==="active"&&sessionData.spotifyUrl&&(()=>{
              const m=sessionData.spotifyUrl.match(/open\.spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/);
              if(!m)return null;
              return <div style={{width:"100%",marginBottom:16,borderRadius:12,overflow:"hidden"}}><iframe src={`https://open.spotify.com/embed/${m[1]}/${m[2]}?theme=0`} width="100%" height="80" frameBorder="0" allow="encrypted-media" style={{borderRadius:12}}/></div>;
            })()}
            {sessionPhase==="heating"?(
              <div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}>
                <Btn accent="white" onClick={()=>{setSessionPhase("active");setTimeLeft(30);if(navigator.vibrate)navigator.vibrate([100,80,150,80,250])}}>Start Inhale Timer</Btn>
                <Btn secondary onClick={onClose}>Cancel</Btn>
              </div>
            ):(
              <div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[{label:"+30s",icon:"⏱",fn:()=>setTimeLeft(p=>p+30)},{label:isPaused?"Resume":"Pause",icon:isPaused?"▶":"⏸",fn:()=>setIsPaused(p=>!p)},{label:"+18°F",icon:"🔥",fn:()=>setBoosts(p=>p+1)}].map(b=><button key={b.label} onClick={b.fn} style={{padding:"14px 0",borderRadius:14,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"white",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:500}}><span style={{fontSize:16}}>{b.icon}</span>{b.label}</button>)}
                </div>
                <Btn accent="white" onClick={()=>setSessionPhase("effects")}>End Session</Btn>
              </div>
            )}
          </div>
        )}

        {/* EFFECTS */}
        {sessionPhase==="effects"&&(
          <div className="fu fu1" style={{flex:1}}>
            <div style={{textAlign:"center",marginBottom:24}}><h2 style={{fontSize:22,fontWeight:300,letterSpacing:4,textTransform:"uppercase"}}>How Do You Feel?</h2></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
              {EFFECTS_LIST.map(e=>{const sel=ratingData.effects.includes(e.id);return <button key={e.id} onClick={()=>setRatingData(p=>({...p,effects:sel?p.effects.filter(x=>x!==e.id):[...p.effects,e.id]}))} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"14px 8px",borderRadius:14,cursor:"pointer",background:sel?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.02)",border:`1px solid ${sel?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.06)"}`,color:sel?"white":"rgba(255,255,255,0.4)"}}><span style={{fontSize:22}}>{e.emoji}</span><span style={{fontSize:8,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,textAlign:"center",lineHeight:1.3}}>{e.label}</span></button>})}
            </div>
            <Btn accent="white" onClick={()=>setSessionPhase("rating")}>Next — Rate It</Btn>
            <Btn secondary onClick={()=>setSessionPhase("rating")} style={{marginTop:8}}>Skip</Btn>
          </div>
        )}

        {/* RATING */}
        {sessionPhase==="rating"&&(
          <div className="fu fu1" style={{flex:1}}>
            <div style={{textAlign:"center",marginBottom:24}}><h2 style={{fontSize:22,fontWeight:300,letterSpacing:4,textTransform:"uppercase"}}>Rate Session</h2></div>
            <div style={{display:"flex",flexDirection:"column",gap:18,marginBottom:24}}>
              {[{key:"vapor",label:"Vapor Quality"},{key:"taste",label:"Taste / Terps"},{key:"potency",label:"Potency"},{key:"rating",label:"Overall"}].map(m=><div key={m.key}><ML>{m.label}</ML><div style={{display:"flex",gap:6}}>{[1,2,3,4,5].map(s=><button key={s} onClick={()=>setRatingData(p=>({...p,[m.key]:s}))} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Leaf size={24} filled={s<=ratingData[m.key]} accent={accent}/></button>)}</div></div>)}
              <div><ML>Notes</ML><Input rows={2} value={ratingData.notes} onChange={e=>setRatingData(p=>({...p,notes:e.target.value}))} placeholder="Flavor, effects, thoughts..."/></div>
            </div>
            {/* Flavor Tags — post-dab */}
            <ML>Flavor Notes</ML>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
              {FLAVORS.map(f=>{const sel=(ratingData.flavors||[]).includes(f);return(
                <button key={f} onClick={()=>setRatingData(p=>({...p,flavors:sel?(p.flavors||[]).filter(x=>x!==f):[...(p.flavors||[]),f]}))}
                  style={{padding:"5px 10px",borderRadius:10,fontSize:9,letterSpacing:1,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontWeight:500,WebkitTapHighlightColor:"transparent",
                    background:sel?`${accent}15`:"rgba(255,255,255,0.03)",border:`1px solid ${sel?accent+"40":"rgba(255,255,255,0.06)"}`,color:sel?accent:"rgba(255,255,255,0.35)"}}>
                  {f}
                </button>
              )})}
            </div>
            <Btn accent="white" onClick={completeSession}>Save Session</Btn>
            <Btn secondary onClick={completeSession} style={{marginTop:8}}>Skip & Save</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Flip Session Card ─────────────────────────────────
// Tap = flip to show stats back. Long press (300ms) = open full detail modal.
function FlipSessionCard({ item, accent, onSelect }) {
  const [flipped, setFlipped] = useState(false);
  const [frontH, setFrontH] = useState(0);
  const [backH, setBackH] = useState(0);
  const frontRef = useRef(null);
  const backRef = useRef(null);
  const pressTimer = useRef(null);
  const didLongPress = useRef(false);

  const z = getZone(item.finalTempF || 500);

  useEffect(() => {
    if (frontRef.current) setFrontH(frontRef.current.offsetHeight);
    if (backRef.current) setBackH(backRef.current.offsetHeight);
  }, [item]);

  const onPointerDown = () => {
    didLongPress.current = false;
    pressTimer.current = setTimeout(() => {
      didLongPress.current = true;
      onSelect(item);
      if (navigator.vibrate) navigator.vibrate(30);
    }, 300);
  };
  const onPointerUp = () => {
    clearTimeout(pressTimer.current);
    if (!didLongPress.current) {
      setFlipped(f => !f);
      // Re-measure after flip in case content changed
      requestAnimationFrame(() => {
        if (frontRef.current) setFrontH(frontRef.current.offsetHeight);
        if (backRef.current) setBackH(backRef.current.offsetHeight);
      });
    }
  };
  const onPointerLeave = () => { clearTimeout(pressTimer.current); };

  return (
    <div style={{ perspective: 800, WebkitTapHighlightColor: "transparent" }}>
      <div
        onPointerDown={onPointerDown}
        onPointerUp={onPointerUp}
        onPointerLeave={onPointerLeave}
        style={{
          position: "relative", transformStyle: "preserve-3d", cursor: "pointer",
          transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
          transition: "transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), height 0.4s ease",
          height: flipped ? (backH || "auto") : (frontH || "auto"),
        }}
      >
        {/* ─── FRONT ─── */}
        <div ref={frontRef} style={{ backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden", position: "absolute", top: 0, left: 0, right: 0 }}>
          <Glass style={{ padding: 0, overflow: "hidden" }}>
            {item.photo && <div style={{ width: "100%", height: 100, overflow: "hidden" }}><img src={item.photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /></div>}
            <div style={{ padding: "14px 16px" }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>{item.brand}</div>
                  <div style={{ fontSize: 14, fontWeight: 500, marginTop: 3 }}>{item.strain}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", fontFamily: "'JetBrains Mono',monospace" }}>{item.type}</span>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.15)" }}>·</span>
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", fontFamily: "'JetBrains Mono',monospace" }}>{item.classification}</span>
                  </div>
                  {item.notes && <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", fontStyle: "italic", marginTop: 6, lineHeight: 1.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>"{item.notes}"</div>}
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, flexShrink: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 12, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)" }}><div style={{ width: 6, height: 6, borderRadius: "50%", background: z.hex }} /><span style={{ fontSize: 9, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace", color: "rgba(255,255,255,0.5)" }}>{item.finalTempF}°</span></div>
                  <div style={{ display: "flex", gap: 1 }}>{[1, 2, 3, 4, 5].map(s => <Leaf key={s} size={9} filled={s <= item.rating} accent={accent} />)}</div>
                  <span style={{ fontSize: 8, color: "rgba(255,255,255,0.2)", fontFamily: "'JetBrains Mono',monospace" }}>{item.date}</span>
                </div>
              </div>
              {item.effects?.length > 0 && <div style={{ display: "flex", gap: 4, marginTop: 8, flexWrap: "wrap" }}>{item.effects.slice(0, 4).map(eid => { const e = EFFECTS_LIST.find(x => x.id === eid); return e ? <span key={eid} style={{ fontSize: 8, padding: "3px 7px", borderRadius: 10, background: `${accent}12`, color: accent, fontFamily: "'JetBrains Mono',monospace" }}>{e.emoji} {e.label}</span> : null; })}{item.effects.length > 4 && <span style={{ fontSize: 8, color: "rgba(255,255,255,0.2)" }}>+{item.effects.length - 4}</span>}</div>}
              {item.flavors?.length > 0 && <div style={{ display: "flex", gap: 4, marginTop: 6, flexWrap: "wrap" }}>{item.flavors.slice(0, 4).map(f => <span key={f} style={{ fontSize: 7, padding: "2px 6px", borderRadius: 8, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.35)", fontFamily: "'JetBrains Mono',monospace" }}>{f}</span>)}{item.flavors.length > 4 && <span style={{ fontSize: 7, color: "rgba(255,255,255,0.15)" }}>+{item.flavors.length - 4}</span>}</div>}
            </div>
            <div style={{ position: "absolute", bottom: 6, right: 10, fontSize: 7, color: "rgba(255,255,255,0.12)", fontFamily: "'JetBrains Mono',monospace" }}>tap to flip · hold to open</div>
          </Glass>
        </div>

        {/* ─── BACK (stats) ─── */}
        <div ref={backRef} style={{
          backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden",
          transform: "rotateY(180deg)", position: "absolute", top: 0, left: 0, right: 0,
        }}>
          <Glass style={{ overflow: "hidden" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>{item.brand}</div>
                <div style={{ fontSize: 13, fontWeight: 500, marginTop: 2 }}>{item.strain}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 12, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)" }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: z.hex }} />
                <span style={{ fontSize: 9, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace", color: "rgba(255,255,255,0.5)" }}>{z.name} · {item.finalTempF}°F</span>
              </div>
            </div>
            {/* Rating bars */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
              {[{ k: "vapor", l: "Vapor" }, { k: "taste", l: "Taste" }, { k: "potency", l: "Potency" }, { k: "rating", l: "Overall" }].map(m => (
                <div key={m.k} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 8, color: "rgba(255,255,255,0.3)", fontFamily: "'JetBrains Mono',monospace", width: 44 }}>{m.l}</span>
                  <div style={{ flex: 1, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.05)", overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 2, width: `${(item[m.k] || 0) * 20}%`, background: accent }} />
                  </div>
                  <span style={{ fontSize: 8, color: "rgba(255,255,255,0.4)", fontFamily: "'JetBrains Mono',monospace", width: 10, textAlign: "right" }}>{item[m.k] || 0}</span>
                </div>
              ))}
            </div>
            {/* Quick stats row */}
            <div style={{ display: "flex", gap: 8, marginBottom: item.effects?.length > 0 ? 10 : 0 }}>
              <div style={{ flex: 1, padding: "8px 0", borderRadius: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>{item.duration > 0 ? `${Math.floor(item.duration / 60)}:${(item.duration % 60).toString().padStart(2, "0")}` : "—"}</div>
                <div style={{ fontSize: 6, color: "rgba(255,255,255,0.2)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace", marginTop: 2 }}>Duration</div>
              </div>
              <div style={{ flex: 1, padding: "8px 0", borderRadius: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>{item.timeOfDay || "—"}</div>
                <div style={{ fontSize: 6, color: "rgba(255,255,255,0.2)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace", marginTop: 2 }}>Time</div>
              </div>
              <div style={{ flex: 1, padding: "8px 0", borderRadius: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>{item.date}</div>
                <div style={{ fontSize: 6, color: "rgba(255,255,255,0.2)", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace", marginTop: 2 }}>Date</div>
              </div>
            </div>
            {item.effects?.length > 0 && <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>{item.effects.map(eid => { const e = EFFECTS_LIST.find(x => x.id === eid); return e ? <span key={eid} style={{ fontSize: 7, padding: "3px 7px", borderRadius: 8, background: `${accent}12`, color: accent, fontFamily: "'JetBrains Mono',monospace" }}>{e.emoji} {e.label}</span> : null; })}</div>}
            <div style={{ position: "absolute", bottom: 6, right: 10, fontSize: 7, color: "rgba(255,255,255,0.12)", fontFamily: "'JetBrains Mono',monospace" }}>tap to flip · hold to open</div>
          </Glass>
        </div>
      </div>
    </div>
  );
}

function StashTab({stash,accent,stashFilter,setStashFilter,stashSearch,setStashSearch,onSelect,onRepeat,strainMap,setStrainView,setTab}) {
  const [viewMode, setViewMode] = useState("list"); // list or shelf
  const lastSession = stash[0];
  let filtered = stash;
  if(stashFilter!=="All"){if(FILTER_MAP[stashFilter])filtered=filtered.filter(s=>FILTER_MAP[stashFilter].includes(s.type));else filtered=filtered.filter(s=>!Object.values(FILTER_MAP).flat().includes(s.type))}
  if(stashSearch.trim()){const q=stashSearch.toLowerCase();filtered=filtered.filter(s=>s.strain?.toLowerCase().includes(q)||s.brand?.toLowerCase().includes(q))}

  return (
    <div>
      <div className="fu fu1" style={{padding:"22px 0 18px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div><h2 style={{fontSize:20,fontWeight:600,letterSpacing:-0.3}}>Session Log</h2><p style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:5,fontFamily:"'JetBrains Mono',monospace"}}>{stash.length} dab{stash.length!==1?"s":""} logged</p></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {/* View toggle */}
          <div style={{display:"flex",borderRadius:10,overflow:"hidden",border:"1px solid rgba(255,255,255,0.08)"}}>
            <button onClick={()=>setViewMode("list")} style={{padding:"8px 12px",background:viewMode==="list"?`${accent}20`:"transparent",border:"none",color:viewMode==="list"?accent:"rgba(255,255,255,0.25)",fontSize:16,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>☰</button>
            <button onClick={()=>setViewMode("shelf")} style={{padding:"8px 12px",background:viewMode==="shelf"?`${accent}20`:"transparent",border:"none",color:viewMode==="shelf"?accent:"rgba(255,255,255,0.25)",fontSize:16,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>⊞</button>
          </div>
          {Object.keys(strainMap).length>0&&<button onClick={()=>switchTab("encyclopedia")} style={{background:"none",border:"none",color:accent,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,cursor:"pointer"}}>Encyclopedia →</button>}
        </div>
      </div>

      {/* Feature #6: Repeat Last */}
      {lastSession&&lastSession.brand!=="Quick"&&(
        <Glass className="fu fu2" glow={accent} onClick={()=>onRepeat(lastSession)} style={{padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:`${accent}15`,border:`1.5px solid ${accent}40`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:16}}>🔄</span></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:9,color:accent,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>Repeat Last</div>
            <div style={{fontSize:12,fontWeight:500,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lastSession.brand} — {lastSession.strain}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><div style={{width:6,height:6,borderRadius:"50%",background:getZone(lastSession.finalTempF||510).hex}}/><span style={{fontSize:9,color:"rgba(255,255,255,0.4)",fontFamily:"'JetBrains Mono',monospace"}}>{lastSession.finalTempF}°</span></div>
        </Glass>
      )}

      {stash.length===0?(
        <div style={{textAlign:"center",padding:"60px 0"}}><div style={{fontSize:44,opacity:0.15,marginBottom:12}}>🌿</div><p style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>No sessions yet. Hit the flame to start.</p></div>
      ):(
        <>
          <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
            {["All","Rosin","Hash","Resin","Other"].map(f=><button key={f} onClick={()=>setStashFilter(f)} style={{padding:"6px 14px",borderRadius:20,whiteSpace:"nowrap",fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:600,cursor:"pointer",flexShrink:0,fontFamily:"'JetBrains Mono',monospace",background:stashFilter===f?accent:"transparent",color:stashFilter===f?"#000":"rgba(255,255,255,0.35)",border:`1px solid ${stashFilter===f?accent:accent+"30"}`}}>{f}</button>)}
          </div>
          <div style={{position:"relative",marginBottom:14}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"rgba(255,255,255,0.2)"}}>⌕</span>
            <Input value={stashSearch} onChange={e=>setStashSearch(e.target.value)} placeholder="Search strain or brand..." style={{paddingLeft:34}} />
            {stashSearch&&<button onClick={()=>setStashSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:14}}>✕</button>}
          </div>
          {viewMode==="shelf"?(
            /* Jar Shelf View (#25) */
            <div>
              <ML>{Object.keys(strainMap).length} Unique Strains</ML>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                {Object.entries(strainMap).sort((a,b)=>b[1].sessions.length-a[1].sessions.length).map(([key,data])=>{
                  const avgR=data.sessions.filter(s=>s.rating>0).length?(data.sessions.reduce((a,s)=>a+(s.rating||0),0)/data.sessions.filter(s=>s.rating>0).length):0;
                  const photo=data.sessions.find(s=>s.photo)?.photo;
                  return(
                    <Glass key={key} onClick={()=>setStrainView(key)} style={{padding:0,cursor:"pointer",overflow:"hidden",textAlign:"center"}}>
                      <div style={{width:"100%",height:70,background:`${accent}08`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                        {photo?<img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:0.7}}/>:
                        <div style={{fontSize:28,opacity:0.15}}>🫙</div>}
                      </div>
                      <div style={{padding:"8px 6px"}}>
                        <div style={{fontSize:8,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.strain}</div>
                        <div style={{fontSize:7,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{data.brand}</div>
                        <div style={{display:"flex",justifyContent:"center",gap:1,marginTop:4}}>{[1,2,3,4,5].map(s=><Leaf key={s} size={6} filled={s<=Math.round(avgR)} accent={accent}/>)}</div>
                        <div style={{fontSize:7,color:"rgba(255,255,255,0.2)",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{data.sessions.length}×</div>
                      </div>
                    </Glass>
                  );
                })}
              </div>
            </div>
          ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filtered.length===0?<div style={{textAlign:"center",padding:"40px 0"}}><p style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>{stashSearch?`No results for "${stashSearch}"`:"No sessions in this category"}</p></div>
            :filtered.map(item=><FlipSessionCard key={item.id} item={item} accent={accent} onSelect={onSelect} />)}
          </div>
          )}
        </>
      )}
    </div>
  );
}

// STATS TAB
// ═══════════════════════════════════════════════════════
function StatsTab({stash,accent,lvl,xp,streak,unlocked,avg}) {
  const tempCounts=stash.reduce((a,s)=>{const z=getZone(s.finalTempF||500).name;a[z]=(a[z]||0)+1;return a},{});
  if(!stash.length) return <div style={{textAlign:"center",padding:"60px 0"}}><div style={{fontSize:44,opacity:0.15,marginBottom:12}}>📊</div><p style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>No sessions yet</p></div>;
  return (
    <div>
      <div className="fu fu1" style={{padding:"22px 0 18px"}}><h2 style={{fontSize:20,fontWeight:600}}>Stats</h2></div>
      <Glass className="fu fu2" glow={accent} style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
          <div style={{width:46,height:46,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:`${accent}18`,border:`1.5px solid ${accent}50`}}>{lvl.emoji}</div>
          <div style={{flex:1}}><div style={{display:"flex",alignItems:"baseline",gap:8}}><span style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:accent}}>Level {lvl.level}</span><span style={{fontSize:16,fontWeight:500}}>{lvl.title}</span></div><div style={{fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:2,fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{xp.toLocaleString()} XP</div></div>
        </div>
        {lvl.next&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:8,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{lvl.progressXP}/{lvl.neededXP} XP</span><span style={{fontSize:8,color:accent,fontFamily:"'JetBrains Mono',monospace"}}>Next: {lvl.next.title}</span></div><div style={{height:8,borderRadius:4,background:"rgba(255,255,255,0.05)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,width:`${lvl.progress*100}%`,background:accent,transition:"width 1s"}}/></div></div>}
      </Glass>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[{l:"Sessions",v:stash.length},{l:"Streak",v:streak+"d"},{l:"Avg Rating",v:avg("rating")!=="—"?avg("rating")+"★":"—"},{l:"Time",v:Math.floor(stash.reduce((a,b)=>a+(b.duration||0),0)/60)+"m"}].map((s,i)=><Glass key={i} style={{padding:16}}><div style={{fontSize:20,fontFamily:"'JetBrains Mono',monospace",fontWeight:300}}>{s.v}</div><div style={{fontSize:8,color:"rgba(255,255,255,0.25)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:4}}>{s.l}</div></Glass>)}
      </div>
      <Glass style={{marginBottom:14}}><ML>Temp Distribution</ML><div style={{display:"flex",alignItems:"flex-end",gap:8,height:70,marginTop:10}}>{HEAT_ZONES.map(z=>{const c=tempCounts[z.name]||0;const mx=Math.max(...Object.values(tempCounts),1);return <div key={z.name} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}>{c}</span><div style={{width:"100%",height:`${(c/mx)*50}px`,borderRadius:5,background:`linear-gradient(to top,${z.hex}40,${z.hex}10)`,border:`1px solid ${z.hex}20`}}/><div style={{width:7,height:7,borderRadius:"50%",background:z.hex}}/></div>})}</div></Glass>
      <Glass style={{marginBottom:14}}><ML>Achievements · {unlocked.length}/{ACHIEVEMENTS.filter(a=>!a.secret||a.check(stash)).length}</ML><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>{ACHIEVEMENTS.filter(a=>!a.secret||a.check(stash)).map(a=>{const earned=a.check(stash);return <div key={a.id} title={a.title} style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:earned?`${accent}15`:"rgba(255,255,255,0.02)",border:`1px solid ${earned?accent+"40":"rgba(255,255,255,0.05)"}`,fontSize:18,opacity:earned?1:0.3}}>{a.secret&&!earned?"❓":a.emoji}</div>})}</div></Glass>

      {/* Potency Prediction */}
      {stash.length>=5&&(()=>{
        const brands={};
        stash.forEach(s=>{if(s.brand&&s.rating>0){if(!brands[s.brand])brands[s.brand]={total:0,count:0,strains:new Set()};brands[s.brand].total+=s.rating;brands[s.brand].count++;brands[s.brand].strains.add(s.strain)}});
        const ranked=Object.entries(brands).filter(([,v])=>v.count>=2).map(([name,v])=>({name,avg:(v.total/v.count).toFixed(1),count:v.count,strains:v.strains.size})).sort((a,b)=>b.avg-a.avg).slice(0,3);
        if(!ranked.length)return null;
        // Find best temp zone
        const zoneRatings={};
        stash.forEach(s=>{if(s.rating>0){const z=getZone(s.finalTempF||500).name;if(!zoneRatings[z])zoneRatings[z]={total:0,count:0};zoneRatings[z].total+=s.rating;zoneRatings[z].count++}});
        const bestZone=Object.entries(zoneRatings).map(([n,v])=>({name:n,avg:v.total/v.count})).sort((a,b)=>b.avg-a.avg)[0];
        return(
          <Glass style={{marginBottom:14}}>
            <ML>Potency Prediction</ML>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",lineHeight:1.5,marginBottom:12}}>Based on your {stash.length} sessions, here's what hits hardest:</p>
            {ranked.map((b,i)=>(
              <div key={b.name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<ranked.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                <span style={{fontSize:14,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:i===0?accent:"rgba(255,255,255,0.4)",width:20}}>{i===0?"🏆":i===1?"🥈":"🥉"}</span>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:500}}>{b.name}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:"'JetBrains Mono',monospace"}}>{b.count} sessions · {b.strains} strains</div></div>
                <span style={{fontSize:14,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{b.avg}★</span>
              </div>
            ))}
            {bestZone&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)"}}>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}>Your sweet spot: </span>
              <span style={{fontSize:10,fontWeight:600}}>{bestZone.name}</span>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"'JetBrains Mono',monospace"}}> zone — avg {bestZone.avg.toFixed(1)}★</span>
            </div>}
          </Glass>
        );
      })()}

      {/* Constellation Map */}
      {stash.length>=3&&(()=>{
        const strains={};
        stash.forEach(s=>{
          const key=`${s.brand}|||${s.strain}`;
          if(!strains[key])strains[key]={brand:s.brand,strain:s.strain,count:0,avgRating:0,total:0,type:s.type};
          strains[key].count++;strains[key].total+=(s.rating||0);
        });
        const stars=Object.values(strains).map(s=>({...s,avgRating:s.count>0?s.total/s.count:0}));
        if(stars.length<3)return null;
        // Position each star using a seeded hash for consistent placement
        const hash=(str)=>{let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0}return h};
        const positioned=stars.map(s=>{
          const h1=hash(s.brand+s.strain);const h2=hash(s.strain+s.brand);
          return{...s,x:15+Math.abs(h1%280),y:15+Math.abs(h2%170),size:Math.max(2,Math.min(6,s.count*1.5+s.avgRating*0.5))};
        });
        // Draw lines between same-brand strains
        const brandGroups={};positioned.forEach(s=>{if(!brandGroups[s.brand])brandGroups[s.brand]=[];brandGroups[s.brand].push(s)});
        const lines=[];
        Object.values(brandGroups).forEach(group=>{for(let i=0;i<group.length-1;i++)lines.push({x1:group[i].x,y1:group[i].y,x2:group[i+1].x,y2:group[i+1].y})});
        return(
          <Glass style={{marginBottom:14}}>
            <ML>Strain Constellation</ML>
            <p style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginBottom:8}}>Each star is a strain. Lines connect same brand. Bigger = more sessions.</p>
            <svg viewBox="0 0 310 200" style={{width:"100%",height:"auto"}}>
              {lines.map((l,i)=><line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={accent} strokeWidth="0.5" opacity="0.2"/>)}
              {positioned.map((s,i)=>(
                <g key={i}>
                  <circle cx={s.x} cy={s.y} r={s.size+3} fill={accent} opacity="0.08"/>
                  <circle cx={s.x} cy={s.y} r={s.size} fill={s.avgRating>=4?accent:s.avgRating>=3?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.2)"}/>
                  <text x={s.x} y={s.y+s.size+8} textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="4" fontFamily="'JetBrains Mono',monospace">{s.strain.slice(0,12)}</text>
                </g>
              ))}
            </svg>
          </Glass>
        );
      })()}
    </div>
  );
}

// CARE TAB
// ═══════════════════════════════════════════════════════
function CareTab({profile,accent,onClean,setProfile}) {
  const threshold = profile.cleanThreshold || 30;
  const pct=Math.min(((profile.dabsSinceClean||0)/threshold)*100,100);
  let sc="#4ade80";if(pct>60)sc="#facc15";if(pct>=100)sc="#ef4444";
  const circ=283,off=circ-(circ*pct)/100;
  return (
    <div>
      <div className="fu fu1" style={{padding:"22px 0 18px"}}><h2 style={{fontSize:20,fontWeight:600}}>Peak Care</h2></div>
      <Glass className="fu fu2" style={{textAlign:"center",marginBottom:18}}>
        <div style={{position:"relative",width:160,height:160,margin:"0 auto 18px"}}>
          <svg style={{width:"100%",height:"100%",transform:"rotate(-90deg)"}} viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="transparent" stroke="rgba(255,255,255,0.04)" strokeWidth="3.5"/><circle cx="50" cy="50" r="45" fill="transparent" stroke={sc} strokeWidth="3.5" strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{}}/></svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:34,fontWeight:200,fontFamily:"'JetBrains Mono',monospace"}}>{profile.dabsSinceClean||0}</span><span style={{fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>Sessions</span></div>
        </div>
        <h3 style={{fontSize:16,fontWeight:500,marginBottom:6}}>{pct>=100?"Time for an ISO Soak":"Chamber is Healthy"}</h3>
        <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",lineHeight:1.5,maxWidth:240,margin:"0 auto 18px"}}>{pct>=100?"Drop your chamber in 99% ISO.":`~${threshold-(profile.dabsSinceClean||0)} sessions until cleaning.`}</p>
        <Btn accent={pct>=100?"white":null} secondary={pct<100} onClick={onClean}>{pct>=100?"Log ISO Soak":"Cleaned it Early"}</Btn>
        {/* Threshold slider */}
        <div style={{marginTop:16,display:"flex",alignItems:"center",gap:10}}>
          <ML style={{marginBottom:0,whiteSpace:"nowrap"}}>Clean at</ML>
          <input type="range" min={10} max={60} value={threshold} onChange={e=>setProfile(p=>({...p,cleanThreshold:Number(e.target.value)}))} style={{flex:1,accentColor:accent}} />
          <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",minWidth:30,textAlign:"right"}}>{threshold}</span>
        </div>
      </Glass>

      {/* Cleaning Guide */}
      <Glass style={{marginBottom:14}}>
        <ML>Cleaning Guide</ML>
            <div style={{fontSize:10,color:accent,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,marginBottom:12}}>Chamber Soak</div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {[
                {step:"1",title:"Remove the Chamber",desc:"Let your Peak cool completely. Gently pull the atomizer chamber straight up and out of the base."},
                {step:"2",title:"Prepare ISO Bath",desc:"Pour enough 99% isopropyl alcohol into a small glass or container to fully submerge the chamber. Do NOT use less than 91%."},
                {step:"3",title:"Soak 20–30 Minutes",desc:"Drop the chamber into the ISO. Let it sit — don't rush this. For heavy buildup, soak up to an hour."},
                {step:"4",title:"Agitate Gently",desc:"After soaking, swirl the chamber around in the ISO to loosen any remaining residue. Use a cotton swab on stubborn spots."},
                {step:"5",title:"Rinse & Dry",desc:"Remove the chamber and rinse with warm water. Set it on a clean paper towel and let it air dry completely — at least 10 minutes."},
                {step:"6",title:"Clean the Base Connection",desc:"While the chamber dries, use an ISO-dipped cotton swab to clean the connection pins inside the base where the atomizer sits."},
                {step:"7",title:"Reassemble",desc:"Once everything is bone dry, drop the chamber back in. Run an empty heat cycle on Blue to burn off any residual moisture."},
              ].map(s => (
                <div key={s.step} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:`${accent}20`,border:`1px solid ${accent}30`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:9,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:accent}}>{s.step}</div>
                  <div><div style={{fontSize:12,fontWeight:500,marginBottom:2}}>{s.title}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.35)",lineHeight:1.5}}>{s.desc}</div></div>
                </div>
              ))}
            </div>

            <div style={{height:1,background:"rgba(255,255,255,0.06)",margin:"18px 0"}} />

            <div style={{fontSize:10,color:accent,letterSpacing:2,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,marginBottom:12}}>Pro Tips</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[
                {icon:"🧊",tip:"Keep a dedicated jar with ISO ready to go — drop your chamber in right after your last session while you're cleaning up."},
                {icon:"🔥",tip:"Running hotter temps (Red/White) leaves more residue. Clean every 20 sessions if you run hot, 30+ if you stay on Blue/Green."},
                {icon:"🧹",tip:"Quick swab the chamber with a dry Q-tip after every 2-3 sessions. Prevents buildup from hardening and makes deep cleans easier."},
                {icon:"⚠️",tip:"Never submerge the entire Peak base in liquid. Only the removable chamber and cap should be soaked."},
                {icon:"💧",tip:"If you see rainbowing (rainbow discoloration) on the chamber walls, that's normal oxidation — not dirt. ISO won't remove it and it doesn't affect performance."},
                {icon:"🔄",tip:"Replace your chamber every 6-12 months depending on use. Performance degrades over time even with perfect maintenance."},
              ].map((t, i) => (
                <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:14,flexShrink:0,marginTop:1}}>{t.icon}</span>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",lineHeight:1.5}}>{t.tip}</div>
                </div>
              ))}
            </div>
      </Glass>

      {(profile.cleanHistory||[]).length>0&&<div><ML>Clean History</ML>{(profile.cleanHistory||[]).slice(0,5).map((e,i)=><Glass key={i} style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"#4ade80",fontSize:14}}>✓</span><span style={{fontSize:12,fontWeight:500}}>ISO Soak</span></div><div style={{textAlign:"right"}}><div style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontFamily:"'JetBrains Mono',monospace"}}>{e.date}</div></div></Glass>)}</div>}
    </div>
  );
}
